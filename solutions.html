<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>希薄溶液｜Interactive Lab</title>
<meta name="description" content="沸点上昇・凝固点降下・浸透圧の束一的性質と、DLVO・電気泳動・塩析・保護コロイドを粒子モデルで学ぶ授業用シミュレーター。">
<meta name="theme-color" content="#2563eb">
<link rel="icon" href="icons/icon-192.png">
<style>
  :root {
    --curve: #2563eb;
    --solution: #7c3aed;
    --accent: #f97316;
    --supercool: #ef4444;
    --solid: #0ea5e9;
    --extrap: #94a3b8;
    --grid: #e8eef7;
    --axis: #64748b;
    --ink: #172033;
    --ink2: #526078;
    --ink3: #8995a9;
    --bg: #f3f6fb;
    --card: #fff;
    --border: #dce4f0;
    --blue-soft: #edf4ff;
    --blue-deep: #173b75;
    --shadow: 0 12px 32px rgba(28, 50, 87, .08);
    --shadow-sm: 0 4px 14px rgba(28, 50, 87, .06);
  }
  * { box-sizing: border-box; }
  html { min-width: 320px; background: var(--bg); }
  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    background:
      radial-gradient(circle at 8% -10%, rgba(37, 99, 235, .10), transparent 30rem),
      radial-gradient(circle at 92% 5%, rgba(124, 58, 237, .07), transparent 28rem),
      var(--bg);
    font-family: Inter, 'Yu Gothic UI', 'Yu Gothic', Meiryo, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 22px clamp(16px, 4vw, 54px) 0;
    background: rgba(255,255,255,.78);
    border-bottom: 1px solid rgba(220,228,240,.9);
    backdrop-filter: blur(18px);
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    max-width: 1440px;
    margin: 0 auto 16px;
  }
  h1 { margin: 0; color: var(--blue-deep); font-size: clamp(24px,3vw,34px); letter-spacing: -.035em; }
  h1::before {
    content: none; display: block; width: max-content; margin-bottom: 6px;
    padding: 4px 9px; border-radius: 99px; background: var(--blue-soft); color: var(--curve);
    font: 800 10px/1 Inter,Arial,sans-serif; letter-spacing: .13em;
  }
  .subtitle { margin: 6px 0 0; color: var(--ink2); font-size: 13px; font-weight: 600; }
  .fullscreen-btn {
    flex: 0 0 auto; padding: 10px 14px; border: 1px solid var(--border); border-radius: 11px;
    background: #fff; color: var(--blue-deep); box-shadow: var(--shadow-sm); cursor: pointer;
    font-family: inherit; font-size: 13px; line-height: 1; font-weight: 800;
  }
  .fullscreen-btn::before { content: '⛶'; margin-right: 7px; font-size: 16px; }
  .tabs { display: flex; gap: 6px; max-width: 1440px; margin: 0 auto; overflow-x: auto; }
  .tabs button {
    flex: 0 0 auto; padding: 11px 18px 13px; border: 1px solid transparent; border-bottom: 0;
    border-radius: 10px 10px 0 0; background: transparent; color: var(--ink2); cursor: pointer;
    font-family: inherit; font-size: 14px; line-height: 1.2; font-weight: 800;
  }
  .tabs button[aria-selected="true"] {
    border-color: var(--border); background: var(--bg); color: var(--curve);
    box-shadow: inset 0 3px 0 var(--curve);
  }
  main { max-width: 1550px; margin: 0 auto; padding: 20px clamp(14px,4vw,54px) 42px; }
  .panel { display: none; }
  .panel.active { display: block; animation: appear .2s ease-out; }
  @keyframes appear { from { opacity: .3; transform: translateY(3px); } }
  .panel-tools { display: flex; flex-wrap: wrap; justify-content: flex-end; align-items: center; gap: 8px; min-height: 36px; margin-bottom: 8px; }
  .swap-btn {
    padding: 8px 13px; border: 1px solid var(--border); border-radius: 99px; background: #fff;
    color: var(--curve); box-shadow: var(--shadow-sm); cursor: pointer; font-family: inherit; font-size: 12px; line-height: 1; font-weight: 800;
  }
  .swap-btn::before { content: '⇄'; margin-right: 7px; font-size: 16px; }
  .swap-btn:disabled { color: var(--ink3); background: #f8fafc; cursor: default; opacity: .55; }
  .arrow-toggle {
    padding: 8px 11px; border: 1px solid currentColor; border-radius: 99px; background: #fff;
    cursor: pointer; font-family: inherit; font-size: 12px; line-height: 1; font-weight: 800;
  }
  .arrow-toggle::before { content: ''; display: inline-block; width: 8px; height: 8px; margin-right: 6px; border-radius: 50%; background: currentColor; }
  .arrow-toggle.rise { color: #ea580c; background: #fff7ed; }
  .arrow-toggle.drop { color: #0f766e; background: #f0fdfa; }
  .arrow-toggle[aria-pressed="false"] { color: var(--ink3); border-color: var(--border); background: #fff; }
  .freezing-toggle { color: var(--curve); background: var(--blue-soft); }
  .freezing-toggle.extrapolation { color: #c2410c; background: #fff7ed; }
  .freezing-toggle.supercooling { color: #dc2626; background: #fff1f2; }
  .solution-series-toggle { color: #6d28d9; background: #f7f3ff; }
  .boiling-toggle { color: var(--curve); background: var(--blue-soft); }
  .boiling-toggle.vapor100 { color: #0f766e; background: #f0fdfa; }
  .colloid-toggle.charge { color: #dc2626; background: #fff1f2; }
  .colloid-toggle.ion { color: #0f766e; background: #f0fdfa; }
  .colloid-toggle.dlvo { color: #7c3aed; background: #f7f3ff; }
  .model-toggle::before { content: '▣'; }
  .layout { display: grid; grid-template-columns: minmax(0,1fr) minmax(330px,405px); gap: 20px; align-items: start; }
  .chart-card, .card {
    background: rgba(255,255,255,.96); border: 1px solid rgba(210,221,236,.92);
    box-shadow: var(--shadow); border-radius: 18px;
  }
  .chart-card { position: relative; min-width: 0; padding: 10px 14px 14px; overflow: hidden; }
  .chart-card::before {
    content: 'INTERACTIVE GRAPH'; display: block; margin: 1px 0 2px 3px;
    color: var(--ink3); font: 800 9px/1 Inter,Arial,sans-serif; letter-spacing: .15em;
  }
  .chart-card svg { display: block; width: 100%; height: auto; }
  .side { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
  .card { padding: 12px 15px; box-shadow: var(--shadow-sm); }
  .model-card { padding: 8px 10px; background: linear-gradient(135deg,#fafdff,#edf5ff); }
  .model-card svg { display: block; width: 100%; max-width: 340px; height: auto; margin: 0 auto; }
  .zoom-card { padding: 8px 10px; background: linear-gradient(135deg,#fff,#f7f9fd); }
  .zoom-card svg { display: block; width: 100%; max-width: 390px; height: auto; margin: 0 auto; }
  .dlvo-card { padding: 7px 9px; background: linear-gradient(135deg,#fff,#faf7ff); }
  .dlvo-card svg { display: block; width: 100%; max-width: 405px; height: auto; margin: 0 auto; }
  #panel-colloid .chart-card::before { content: 'COLLOID PARTICLE MODEL'; }
  #panel-colloid .chart-stage > svg { max-height: 590px; }
  #panel-colloid.dlvo-expanded .chart-card::before { content: 'DLVO INTERACTION ENERGY'; }
  #panel-colloid.dlvo-expanded .chart-stage > #chart-dlvo { width: 100%; height: auto; max-height: 590px; }
  #panel-colloid.dlvo-hidden .dlvo-card { display: none; }
  #panel-colloid.dlvo-hidden .chart-card { grid-column: 1 / -1; }
  #panel-salt .chart-card::before { content: 'HYDRATION MODEL'; }
  #panel-protect .chart-card::before { content: 'PROTECTION MODEL'; }
  #panel-electro .chart-card::before { content: 'ELECTROPHORESIS'; }
  #panel-salt .chart-stage > svg, #panel-protect .chart-stage > svg { max-height: 560px; }
  body.is-fullscreen #panel-salt .chart-card { grid-column: 1 / -1; grid-row: 1; }
  body.is-fullscreen #panel-salt .controls { grid-column: 1; grid-row: 2; }
  body.is-fullscreen #panel-salt .zoom-card { grid-column: 2; grid-row: 2; }
  body.is-fullscreen #panel-salt .chart-stage > svg { max-height: calc(100vh - 220px); }
  #panel-electro .chart-card { grid-column: 1 / -1; }
  #panel-electro .chart-stage > #model-electro { max-height: 660px; }
  body.is-fullscreen #panel-electro .chart-card { grid-column: 1 / -1; }
  body.is-fullscreen #panel-electro .chart-stage > #model-electro { max-height: calc(100vh - 120px); }
  .salt-water-toggle { color: var(--curve); background: var(--blue-soft); }
  .salt-compare-toggle { color: #ea580c; background: #fff7ed; }
  .protect-shell-toggle { color: #0f766e; background: #f0fdfa; }
  .electro-polarity-toggle { color: #7c3aed; background: #f7f3ff; }
  .toggle-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .toggle-row button { flex: 1 1 auto; padding: 7px 9px; border: 1px solid var(--border); border-radius: 9px; background: #f8fafc; color: var(--ink2); cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 800; }
  .toggle-row button[aria-pressed="true"] { background: var(--curve); border-color: var(--curve); color: #fff; }
  .card h2 { margin: 0 0 5px; color: var(--ink2); font-size: 11px; letter-spacing: .055em; }
  .card h2::before { content: ''; display: inline-block; width: 4px; height: 13px; margin-right: 7px; border-radius: 4px; background: var(--curve); vertical-align: -2px; }
  .ctrl { margin: 6px 0 2px; }
  .ctrl label { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 1px; color: var(--ink2); font-size: 12px; }
  .ctrl .val { color: var(--ink); font-weight: 800; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .ctrl input[type=range] { width: 100%; height: 16px; margin: 0; accent-color: var(--curve); cursor: pointer; }
  .stepper { display: flex; align-items: center; justify-content: space-between; gap: 10px; min-height: 31px; }
  .stepper-label { color: var(--ink2); font-size: 12px; }
  .stepper-controls { display: inline-flex; align-items: center; gap: 5px; }
  .stepper-btn { width: 30px; height: 28px; padding: 0; border: 1px solid var(--border); border-radius: 8px; background: var(--blue-soft); color: var(--curve); cursor: pointer; font: 900 18px/1 Inter,Arial,sans-serif; }
  .stepper-btn:disabled { background: #f8fafc; color: var(--ink3); cursor: default; opacity: .55; }
  .stepper-value { min-width: 73px; text-align: center; color: var(--ink); font-size: 12px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .reset-btn { display: block; width: auto; margin: 5px 0 0 auto; padding: 5px 9px; border: 1px solid var(--border); border-radius: 7px; background: #f8fafc; color: var(--ink2); cursor: pointer; font-family: inherit; font-size: 11px; line-height: 1; font-weight: 800; }
  .read-badges { display: flex; flex-wrap: wrap; gap: 6px; margin: 2px 3px 4px; }
  .badge { padding: 5px 8px; border: 1px solid var(--border); border-radius: 8px; background: #fff; color: var(--ink2); font-size: 11px; font-weight: 700; }
  .badge strong { color: var(--ink); font-size: 12px; }
  .badge.solution { border-color: #ddd0fb; background: #f7f3ff; }
  .badge.solution strong { color: var(--solution); }
  .tooltip {
    position: absolute; display: none; z-index: 10; pointer-events: none; padding: 7px 10px;
    border-radius: 9px; background: rgba(23,32,51,.94); color: #fff; font-size: 12px;
    line-height: 1.5; white-space: nowrap; box-shadow: 0 8px 24px rgba(15,23,42,.2);
  }
  .visual-slot { position: relative; width: 100%; }
  .chart-stage > svg { width: 100%; }
  .chart-stage > svg[id^="model-"] { max-width: none; margin: 12px auto; }
  .model-stage > svg { width: 100%; max-width: 390px; margin: 0 auto; }
  #panel-boiling.visuals-swapped .chart-card::before { content: 'BOILING POINT DETAIL'; }
  #panel-freezing .model-card, #panel-osmosis .model-card { display: none; }
  #panel-freezing.freezing-model-visible .model-card, #panel-osmosis.osmosis-model-visible .model-card { display: block; padding: 5px; }
  #panel-freezing.freezing-model-visible .chart-card::before, #panel-osmosis.osmosis-model-visible .chart-card::before { content: 'PARTICLE MODEL'; }
  #panel-freezing.freezing-model-visible .layout, #panel-osmosis.osmosis-model-visible .layout { grid-template-columns: minmax(320px,.72fr) minmax(520px,1.28fr); }
  #panel-freezing.freezing-model-visible .chart-stage > #model-freezing, #panel-osmosis.osmosis-model-visible .chart-stage > #model-osmosis { width: min(100%,540px); aspect-ratio: 1; margin: 0 auto; }
  #panel-freezing.freezing-model-visible .model-stage > #chart-freezing, #panel-osmosis.osmosis-model-visible .model-stage > #chart-osmosis { width: 100%; max-width: none; }
  #panel-osmosis.osmosis-graph-hidden .model-card { display: none !important; }
  #panel-osmosis.osmosis-graph-hidden .layout { grid-template-columns: minmax(0,1fr) minmax(330px,405px); }
  #panel-osmosis.osmosis-graph-hidden .chart-stage > #model-osmosis { width: min(100%,560px); }

  body.is-fullscreen { height: 100vh; overflow: hidden; }
  body.is-fullscreen header { display: none; }
  body.is-fullscreen main { width: 100%; height: 100vh; max-width: none; margin: 0; padding: 3px 7px 6px; overflow: hidden; }
  body.is-fullscreen .panel.active { display: flex; height: 100%; min-height: 0; flex-direction: column; }
  body.is-fullscreen .panel-tools { flex: 0 0 auto; min-height: 25px; margin-bottom: 2px; gap: 5px; }
  body.is-fullscreen .panel-tools button { padding-block: 6px; }
  body.is-fullscreen .layout { flex: 1 1 auto; height: 0; min-height: 0; grid-template-columns: minmax(0,1fr) minmax(310px,400px); grid-template-rows: minmax(0,1fr) auto; gap: 5px 7px; align-items: stretch; }
  body.is-fullscreen .chart-card { grid-column: 1; grid-row: 1; min-height: 0; padding: 3px 6px 5px; display: flex; flex-direction: column; }
  body.is-fullscreen .chart-card::before { flex: 0 0 auto; margin-bottom: 0; }
  body.is-fullscreen .read-badges { flex: 0 0 auto; gap: 4px; margin: 1px 2px 2px; }
  body.is-fullscreen .badge { padding: 3px 6px; }
  body.is-fullscreen .chart-stage { flex: 1 1 auto; min-height: 0; display: grid; place-items: center; }
  body.is-fullscreen .chart-stage > svg { width: 100%; height: 100%; max-height: 100%; }
  body.is-fullscreen .side { display: contents; }
  body.is-fullscreen .model-card, body.is-fullscreen .zoom-card, body.is-fullscreen .dlvo-card { grid-column: 2; grid-row: 1; min-height: 0; display: grid; place-items: center; padding: 3px 6px; overflow: hidden; }
  body.is-fullscreen .model-stage { width: 100%; height: 100%; min-height: 0; display: grid; place-items: center; }
  body.is-fullscreen .model-stage > svg { width: 100%; height: 100%; max-width: none; max-height: 100%; }
  body.is-fullscreen .controls { grid-column: 1 / -1; grid-row: 2; display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)) auto; gap: 1px 11px; align-items: end; padding: 3px 8px 4px; }
  body.is-fullscreen .controls h2 { display: none; }
  body.is-fullscreen .controls .ctrl, body.is-fullscreen .controls .reset-btn { margin-top: 0; margin-bottom: 0; }
  body.is-fullscreen .controls .ctrl label { font-size: 11px; }
  body.is-fullscreen .controls .stepper { justify-content: flex-start; gap: 12px; }
  body.is-fullscreen .controls .stepper-label { font-size: 11px; }
  body.is-fullscreen .controls .ctrl input[type=range] { height: 12px; }
  body.is-fullscreen .model-stage > svg[id^="model-"] { width: 315px; height: auto; max-height: calc(100vh - 105px); }
  body.is-fullscreen #panel-freezing:not(.freezing-model-visible) .chart-card, body.is-fullscreen #panel-osmosis:not(.osmosis-model-visible) .chart-card { grid-column: 1 / -1; }
  body.is-fullscreen #panel-osmosis.osmosis-graph-hidden .chart-card { grid-column: 1 / -1; }
  body.is-fullscreen #panel-osmosis.osmosis-graph-hidden .layout { grid-template-columns: minmax(0,1fr); }
  body.is-fullscreen #panel-osmosis.osmosis-model-visible.osmosis-graph-hidden .chart-stage > #model-osmosis { width: auto; height: 100%; max-height: calc(100vh - 150px); }
  .exit-fs-btn { display: none; padding: 8px 13px; border: 1px solid var(--border); border-radius: 99px; background: #fff; color: var(--blue-deep); box-shadow: var(--shadow-sm); cursor: pointer; font-family: inherit; font-size: 12px; line-height: 1; font-weight: 800; }
  .exit-fs-btn::before { content: '⛶'; margin-right: 6px; font-size: 14px; }
  body.is-fullscreen .exit-fs-btn { display: inline-block; }
  body.is-fullscreen #panel-freezing.freezing-model-visible .layout, body.is-fullscreen #panel-osmosis.osmosis-model-visible .layout { grid-template-columns: minmax(330px,.68fr) minmax(0,1.32fr); }
  body.is-fullscreen #panel-freezing.freezing-model-visible .chart-stage > #model-freezing, body.is-fullscreen #panel-osmosis.osmosis-model-visible .chart-stage > #model-osmosis { width: min(100%,calc(100vh - 82px)); height: auto; max-height: calc(100vh - 82px); }
  body.is-fullscreen #panel-freezing.freezing-model-visible .model-stage > #chart-freezing, body.is-fullscreen #panel-osmosis.osmosis-model-visible .model-stage > #chart-osmosis { width: 100%; max-width: none; max-height: calc(100vh - 150px); }
  body.is-fullscreen #panel-colloid .chart-stage > #model-colloid { width: 100%; height: 100%; max-height: calc(100vh - 78px); }
  body.is-fullscreen #panel-colloid .dlvo-card svg { width: 100%; height: 100%; max-width: none; max-height: calc(100vh - 145px); }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    #panel-freezing.freezing-model-visible .layout, #panel-osmosis.osmosis-model-visible .layout { grid-template-columns: 1fr; }
    .header-row { align-items: flex-end; }
    .subtitle { display: none; }
    body.is-fullscreen .layout { grid-template-columns: minmax(0,1fr) minmax(280px,340px); }
  }
  @media (max-width: 620px) {
    header { padding: 17px 12px 0; }
    h1 { font-size: 23px; }
    .fullscreen-btn { width: 42px; height: 42px; padding: 0; font-size: 0; }
    .fullscreen-btn::before { margin: 0; }
    main { padding: 14px 10px 28px; }
    .tabs { margin-inline: -12px; padding-inline: 12px; }
    .layout { gap: 12px; }
  }
  /* スマホ調整：見出し圧縮・トグルボタン小型化 */
  @media (max-width: 560px) {
    header h1 { font-size: 21px; }
    .toggle-row button { font-size: 11px; padding: 7px 7px; }
  }
  /* グラフ内の文字が線と重なっても読めるよう、明示的な stroke 指定がない text に白い縁取り */
  svg text:not([stroke]):not([fill="#fff"]) { paint-order: stroke; stroke: #fff; stroke-width: 2.2px; stroke-linejoin: round; }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <div>
      <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;margin-bottom:8px;padding:7px 14px;border:1px solid #cdd9ea;border-radius:10px;background:#fff;color:#3a4d6b;text-decoration:none;font-size:13.5px;font-weight:800;box-shadow:0 2px 8px rgba(31,55,89,.06)">← 一覧に戻る</a>
      <h1>希薄溶液</h1>
    </div>
    <button class="fullscreen-btn" id="fullscreen" type="button">全画面表示</button>
  </div>
  <nav class="tabs" role="tablist">
    <button role="tab" aria-selected="true" data-tab="boiling">① 蒸気圧降下・沸点上昇</button>
    <button role="tab" aria-selected="false" data-tab="freezing">② 凝固点降下</button>
    <button role="tab" aria-selected="false" data-tab="osmosis">③ 浸透圧</button>
    <button role="tab" aria-selected="false" data-tab="colloid">④ 疎水コロイド（凝析）</button>
    <button role="tab" aria-selected="false" data-tab="electro">⑤ 電気泳動</button>
    <button role="tab" aria-selected="false" data-tab="salt">⑥ 親水コロイド（塩析）</button>
    <button role="tab" aria-selected="false" data-tab="protect">⑦ 保護コロイド</button>
  </nav>
</header>
<main>
  <section class="panel active" id="panel-boiling">
    <div class="panel-tools">
      <button class="arrow-toggle solution-series-toggle" id="toggle-boiling-solution" type="button" aria-pressed="true">希薄溶液：表示</button>
      <button class="arrow-toggle boiling-toggle" id="toggle-boiling-points" type="button" aria-pressed="true">沸点：表示</button>
      <button class="arrow-toggle boiling-toggle vapor100" id="toggle-vapor-pressure-100" type="button" aria-pressed="true">100℃蒸気圧：表示</button>
      <button class="arrow-toggle rise" id="toggle-boiling-rise" type="button" aria-pressed="true">沸点上昇：表示</button>
      <button class="arrow-toggle drop" id="toggle-vapor-drop" type="button" aria-pressed="true">蒸気圧降下：表示</button>
    </div>
    <div class="layout">
      <div class="chart-card" id="chartwrap-boiling">
        <div class="read-badges" id="badges-boiling"></div>
        <svg id="chart-boiling" viewBox="0 0 780 500" role="img" aria-label="純水と希薄溶液の蒸気圧曲線"></svg>
        <div class="tooltip" id="tip-boiling"></div>
      </div>
      <div class="side">
        <div class="card zoom-card">
          <svg id="chart-boiling-zoom" viewBox="0 0 520 360" role="img" aria-label="沸点付近を拡大した純水と希薄溶液の蒸気圧曲線"></svg>
        </div>
        <div class="card controls">
          <h2>条件</h2>
          <div class="ctrl"><label>水の質量 <span class="val"><span id="b-water-val">500</span> g</span></label><input id="b-water" type="range" min="200" max="1000" step="10" value="500"></div>
          <div class="ctrl"><label>溶質の質量 <span class="val"><span id="b-solute-val">30</span> g</span></label><input id="b-solute" type="range" min="0" max="50" step="1" value="30"></div>
          <div class="ctrl"><label>溶質の分子量 <span class="val"><span id="b-molar-val">60</span></span></label><input id="b-molar" type="range" min="60" max="360" step="5" value="60"></div>
          <div class="ctrl">

<script>
'use strict';
const $ = id => document.getElementById(id);
const fmt = (x,d=1) => Number(x).toFixed(d);
// 圧力を Pa の科学表記（有効数字3桁・指数は上付き）に整形。引数は kPa。例: 101.5 → "1.02×10⁵ Pa"
function paSci(kPa){let pa=(+kPa)*1000;if(!isFinite(pa))return'– Pa';if(pa===0)return'0 Pa';const sign=pa<0?'-':'';pa=Math.abs(pa);let e=Math.floor(Math.log10(pa)),ms=(pa/Math.pow(10,e)).toPrecision(3);if(+ms>=10){ms=(+ms/10).toPrecision(3);e++;}const S='⁰¹²³⁴⁵⁶⁷⁸⁹',es=(''+e).split('').map(c=>c==='-'?'⁻':S[+c]).join('');return`${sign}${ms}×10${es} Pa`;}
const SVGNS = 'http://www.w3.org/2000/svg';
const W=780,H=500,ML=76,MR=24,MT=28,MB=62,PW=W-ML-MR,PH=H-MT-MB;
const MW=18.015, KB=0.512, KF=1.86, R=8.314;
const COLORS={pure:'var(--curve)',solution:'var(--solution)',accent:'var(--accent)',gray:'var(--extrap)'};
let showBoilingRiseArrow=true,showVaporPressureArrow=true;
let showBoilingPointGuides=true,showVaporPressureAt100=true;
let showFreezingPointGuides=true,showFreezingExtrapolation=true,showSupercoolingRegion=true;
let showBoilingSolution=true,showFreezingSolution=true,showOsmosisSolution=true;
let showColloidCharges=true,showColloidIons=true,showDLVO=true;

function scaleDomain(xMin,xMax,yMin,yMax){
  return {sx:x=>ML+(x-xMin)/(xMax-xMin)*PW, sy:y=>MT+PH-(y-yMin)/(yMax-yMin)*PH};
}
function frame(o){
  const {sx,sy}=scaleDomain(o.xMin,o.xMax,o.yMin,o.yMax); let s='';
  o.xTicks.forEach(t=>{if(t.v!==o.xMin)s+=`<line x1="${sx(t.v)}" y1="${MT}" x2="${sx(t.v)}" y2="${MT+PH}" stroke="var(--grid)"/>`; s+=`<text x="${sx(t.v)}" y="${MT+PH+23}" text-anchor="middle" font-size="13" fill="var(--ink2)">${t.label}</text>`;});
  o.yTicks.forEach(t=>{if(t.v!==o.yMin)s+=`<line x1="${ML}" y1="${sy(t.v)}" x2="${ML+PW}" y2="${sy(t.v)}" stroke="var(--grid)"/>`; s+=`<text x="${ML-10}" y="${sy(t.v)+4}" text-anchor="end" font-size="13" fill="var(--ink2)">${t.label}</text>`;});
  s+=`<line x1="${ML}" y1="${MT+PH}" x2="${ML+PW}" y2="${MT+PH}" stroke="var(--axis)" stroke-width="1.5"/><line x1="${ML}" y1="${MT}" x2="${ML}" y2="${MT+PH}" stroke="var(--axis)" stroke-width="1.5"/>`;
  s+=`<text x="${ML+PW/2}" y="${H-14}" text-anchor="middle" font-size="15" fill="var(--ink)">${o.xLabel}</text><text x="20" y="${MT+PH/2}" text-anchor="middle" font-size="15" fill="var(--ink)" transform="rotate(-90 20 ${MT+PH/2})">${o.yLabel}</text>`;
  return {sx,sy,svg:s};
}
function path(pts,sx,sy,color,width=3,dash=''){
  const d=pts.map((p,i)=>(i?'L':'M')+fmt(sx(p[0]),1)+' '+fmt(sy(p[1]),1)).join(' ');
  return `<path d="${d}" fill="none" stroke="${color}" stroke-width="${width}" ${dash?`stroke-dasharray="${dash}"`:''} stroke-linecap="round" stroke-linejoin="round"/>`;
}
function areaBetween(upper,lower,x0,x1,sx,sy,opacity=.14,n=60){
  const pts=[];
  for(let i=0;i<=n;i++){const x=x0+(x1-x0)*i/n;pts.push([x,upper(x)]);}
  for(let i=n;i>=0;i--){const x=x0+(x1-x0)*i/n;pts.push([x,lower(x)]);}
  const d=pts.map((p,i)=>(i?'L':'M')+fmt(sx(p[0]),1)+' '+fmt(sy(p[1]),1)).join(' ')+' Z';
  return `<path d="${d}" fill="var(--supercool)" fill-opacity="${opacity}" stroke="none"/>`;
}
function sampleUntilTop(fn,xMin,xMax,yMax,n=180){
  const pts=[];let prev=null;
  for(let i=0;i<=n;i++){
    const x=xMin+(xMax-xMin)*i/n,y=fn(x);
    if(y<=yMax){pts.push([x,y]);prev=[x,y];continue;}
    if(prev){const f=(yMax-prev[1])/(y-prev[1]);pts.push([prev[0]+(x-prev[0])*f,yMax]);}
    break;
  }
  return pts;
}
function waterPsat(tC){return Math.pow(10,8.07131-1730.63/(233.426+tC))*0.133322;}
function inversePsat(kPa){let lo=40,hi=150;for(let i=0;i<60;i++){const m=(lo+hi)/2;waterPsat(m)<kPa?lo=m:hi=m;}return(lo+hi)/2;}
function solutionState(prefix){
  const water=+$(`${prefix}-water`).value, solute=+$(`${prefix}-solute`).value, molar=+$(`${prefix}-molar`).value;
  const i=Math.max(1,+(($(`${prefix}-i`)||{}).value||1)); // ファントホッフ係数（電離後の粒子数）
  const nWater=water/MW,nSolute=molar?solute/molar:0,molality=nSolute/(water/1000);
  const nParticles=i*nSolute,particleMolality=i*molality;
  const xWater=nWater/(nWater+nSolute||1);           // 溶質を分子として数えた参考値
  const xWaterEff=nWater/(nWater+nParticles||1);      // 電離を考慮した実効モル分率（束一的性質はこちら）
  return{water,solute,molar,i,nWater,nSolute,nParticles,molality,particleMolality,xWater,xWaterEff};
}
function osmosisState(){
  const volume=+$('o-volume').value,solute=+$('o-solute').value,molar=+$('o-molar').value,tempC=+$('o-temp').value;
  const i=Math.max(1,+(($('o-i')||{}).value||1)); // ファントホッフ係数（電離後の粒子数）
  const nSolute=molar?solute/molar:0,concentration=nSolute/volume,tempK=tempC+273.15;
  const pressure=i*concentration*R*tempK; // π = i·cRT
  return{volume,solute,molar,i,tempC,tempK,nSolute,concentration,particleConc:i*concentration,pressure};
}
function dots(count,seed=17){let s=seed,out=[];for(let i=0;i<count;i++){s=s*16807%2147483647;const x=(s%1000)/1000;s=s*16807%2147483647;const y=(s%1000)/1000;out.push([x,y]);}return out;}
const DOTS=dots(70);
function attachHover(svgId,tipId,getState){
  const svg=$(svgId),tip=$(tipId);
  svg.addEventListener('pointermove',ev=>{
    const st=getState(),r=svg.getBoundingClientRect(),px=(ev.clientX-r.left)/r.width*W;
    const x=st.xMin+(px-ML)/PW*(st.xMax-st.xMin);
    if(x<st.xMin||x>st.xMax){tip.style.display='none';return;}
    tip.innerHTML=st.lines(x).join('<br>');tip.style.display='block';
    const host=svg.parentElement,hr=host.getBoundingClientRect();let left=ev.clientX-hr.left+13,top=ev.clientY-hr.top-8;
    if(left+tip.offsetWidth>hr.width-7)left-=tip.offsetWidth+25;
    tip.style.left=left+'px';tip.style.top=top+'px';
  });
  svg.addEventListener('pointerleave',()=>tip.style.display='none');
}

function drawBoiling(){
  const st=solutionState('b'),Pext=+$('b-pressure').value;
  $('b-water-val').textContent=st.water;$('b-solute-val').textContent=st.solute;$('b-molar-val').textContent=st.molar;$('b-pressure-val').textContent=paSci(Pext);
  const tbPure=inversePsat(Pext),tbSol=inversePsat(Pext/Math.max(st.xWaterEff,.85)),delta=tbSol-tbPure,p100Pure=101.5,p100Sol=101.5*st.xWaterEff;
  const xMin=70,xMax=125,yMin=0,yMax=160;

function hermite(y0,y1,m0,m1,u,dt){
  const u2=u*u,u3=u2*u;

  if(t<24)return hermite(-3,0,0,0,(t-20)/4,4);

  if(t<14)return 20+slope*t;
  if(t<20)return hermite(tf,tf-3,slope,0,(t-14)/6,6);
  if(t<24)return hermite(tf-3,solutionFreezeLine(24,tf),0,-solutionFreezeSlope(tf),(t-20)/4,4);
  if(t<=42)return solutionFreezeLine(t,tf);

function colloidState(){
  const charge=+$('c-charge').value,conc=+$('c-conc').value,z=+$('c-valence').value;
  const ccc=60*Math.pow(charge/3,2)/Math.pow(z,6),ratio=conc/ccc;
  const ionName=z===1?'Na⁺':z===2?'Ca²⁺':'Al³⁺';
  const repAmp=62*Math.pow(charge/3,2)/(1+1.6*Math.sqrt(ratio));
  const kappa=.72+1.20*Math.sqrt(ratio);
  const repulsion=h=>repAmp*Math.exp(-kappa*h);
  const attraction=h=>-10/(h+.02);
  const total=h=>repulsion(h)+attraction(h);
  let barrier=-Infinity,barrierH=.5;
  for(let i=0;i<=400;i++){const h=.12+4.38*i/400,e=total(h);if(e>barrier){barrier=e;barrierH=h;}}
  const aggregation=Math.max(0,Math.min(1,(ratio-.35)/.9));
  const status=ratio<.60?'分散':ratio<1?'凝析しやすい':'凝析';
  return{charge,conc,z,ccc,ratio,ionName,repulsion,attraction,total,barrier,barrierH,aggregation,status};
}

  $('c-charge-minus').disabled=st.charge<=1;$('c-charge-plus').disabled=st.charge>=5;

function drawDLVO(st){

  const sx=x=>l+(x-xMin)/(xMax-xMin)*pw,sy=y=>t+ph-(Math.max(yMin,Math.min(yMax,y))-yMin)/(yMax-yMin)*ph;

  [.5,1,2,3,4].forEach(v=>{s+=`<line x1="${sx(v)}" y1="${t}" x2="${sx(v)}" y2="${t+ph}" stroke="var(--grid)"/><text x="${sx(v)}" y="${t+ph+21}" text-anchor="middle" font-size="11" fill="var(--ink2)">${v}</text>`;});
  s+=`<line x1="${l}" y1="${t+ph}" x2="${l+pw}" y2="${t+ph}" stroke="var(--axis)" stroke-width="1.5"/><line x1="${l}" y1="${t}" x2="${l}" y2="${t+ph}" stroke="var(--axis)" stroke-width="1.5"/><text x="${l+pw/2}" y="346" text-anchor="middle" font-size="13" fill="var(--ink)">粒子表面間距離 h [nm]</text><text x="17" y="${t+ph/2}" text-anchor="middle" font-size="13" fill="var(--ink)" transform="rotate(-90 17 ${t+ph/2})">相互作用エネルギー [kBT]</text>`;
  const makePath=(pts,color,width,dash='')=>`<path d="${pts.map((p,i)=>(i?'L':'M')+fmt(sx(p[0]),1)+' '+fmt(sy(p[1]),1)).join(' ')}" fill="none" stroke="${color}" stroke-width="${width}" ${dash?`stroke-dasharray="${dash}"`:''} stroke-linecap="round" stroke-linejoin="round"/>`;

  s+=`<text x="${sx(2.15)}" y="${sy(st.repulsion(2.15))-10}" font-size="11" font-weight="bold" fill="#2563eb" stroke="#fff" stroke-width="4" paint-order="stroke fill">電気二重層反発</text><text x="${sx(2.15)}" y="${sy(st.attraction(2.15))+17}" font-size="11" font-weight="bold" fill="#ea580c" stroke="#fff" stroke-width="4" paint-order="stroke fill">van der Waals引力</text><text x="${sx(2.85)}" y="${sy(st.total(2.85))-11}" font-size="12" font-weight="900" fill="#7c3aed" stroke="#fff" stroke-width="4" paint-order="stroke fill">合計</text>`;
  if(st.barrier>0){s+=`<line x1="${sx(st.barrierH)}" y1="${sy(0)}" x2="${sx(st.barrierH)}" y2="${sy(st.barrier)}" stroke="#dc2626" stroke-width="2"/><circle cx="${sx(st.barrierH)}" cy="${sy(st.barrier)}" r="5" fill="#dc2626" stroke="#fff" stroke-width="2"/><text x="${sx(st.barrierH)+10}" y="${Math.max(20,sy(st.barrier)-8)}" font-size="11" font-weight="bold" fill="#dc2626" stroke="#fff" stroke-width="4" paint-order="stroke fill">エネルギー障壁 ${fmt(st.barrier,1)} kBT</text>`;}
  s+=`<text x="${w-16}" y="17" text-anchor="end" font-size="10" font-weight="bold" fill="var(--ink3)">DLVO MODEL</text>`;

// ===== ⑤ 親水コロイドの塩析（脱水機構：DLVOは使わない） =====
let showSaltWater=true,showSaltCompare=true;
function saltState(){
  const hydro=+$('s-hydro').value,conc=+$('s-conc').value;
  const cSalt=0.8+0.55*hydro,onset=cSalt*0.55;               // 塩析に要する濃度は親水性が強いほど大きい
  const agg=Math.max(0,Math.min(1,(conc-onset)/(cSalt-onset)));
  const shell=Math.max(0,Math.min(1,1-conc/(cSalt*1.05)));   // 水和水の保持率
  const status=agg<0.05?'安定（水和で分散）':agg<0.85?'塩析が進行中':'塩析（沈殿）';
  return{hydro,conc,cSalt,onset,agg,shell,status};
}
function drawSaltModel(st){
  const box={x:32,y:74,w:716,h:388};
  const dispersed=[[140,150],[300,135],[470,150],[640,140],[210,270],[390,255],[560,270],[690,275],[150,385],[330,390],[510,385],[660,390]];
  const clustered=[[300,255],[352,238],[322,300],[382,288],[432,250],[472,298],[420,340],[360,350],[300,348],[500,258],[520,318],[460,358]];
  // 電解質イオンが並ぶ位置（固定）。水和水はコロイドからここへ移動する。
  const anchors=[[105,150],[250,112],[560,118],[702,175],[118,340],[300,185],[600,300],[696,372],[180,448],[406,128],[520,438],[642,256]];
  const a=st.agg,frac=st.conc/st.cSalt;
  let s=`<rect x="${box.x}" y="${box.y}" width="${box.w}" height="${box.h}" rx="22" fill="#f8fbff" stroke="var(--border)" stroke-width="2"/>`;
  const sc=st.agg<0.05?'#2563eb':st.agg<0.85?'#f97316':'#dc2626';
  s+=`<text x="390" y="44" text-anchor="middle" font-size="24" font-weight="900" fill="${sc}">${st.status}</text>`;
  s+=`<text x="390" y="66" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--ink2)">${st.agg<0.05?'水和水の殻がコロイドを分散させている':st.agg<0.85?'多量の電解質が水和水を引き寄せ、奪っていく':'水和水を失って凝集・沈殿した'}</text>`;
  // コロイド本体（水和殻の水は下の水和水で描画。移動した分だけ殻から減る）
  const parts=[];
  for(let i=0;i<dispersed.length;i++){const x=dispersed[i][0]*(1-a)+clustered[i][0]*a,y=dispersed[i][1]*(1-a)+clustered[i][1]*a;parts.push([x,y]);
    if(showSaltWater)s+=`<circle cx="${fmt(x,1)}" cy="${fmt(y,1)}" r="37" fill="#60a5fa" fill-opacity="0.16" stroke="#60a5fa" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="4 4"/>`;
    s+=`<circle cx="${fmt(x,1)}" cy="${fmt(y,1)}" r="24" fill="#6b7f9e" stroke="#41506a" stroke-width="3"/>`;
  }
  // 電解質イオン（濃度とともにフェードイン）
  for(let i=0;i<12;i++){const aPt=anchors[i],ionOp=Math.max(0,Math.min(1,frac*1.6-i*0.08));
    if(ionOp>0.02){const cat=i%2===0;s+=`<circle cx="${aPt[0]}" cy="${aPt[1]}" r="8" fill="${cat?'#14b8a6':'#f59e0b'}" opacity="${fmt(ionOp,2)}"/><text x="${aPt[0]}" y="${aPt[1]+3}" text-anchor="middle" font-size="9" font-weight="900" fill="#fff" opacity="${fmt(ionOp,2)}">${cat?'＋':'−'}</text>`;}
  }
  // 水和水：各コロイドの殻の水が1粒ずつイオンへ移動する。移動した水はその分だけ殻から消える（保存）
  if(showSaltWater)for(let i=0;i<12;i++){const cen=parts[i],aPt=anchors[i];
    for(let k=0;k<6;k++){
      const ang=(i*40+k*60)*Math.PI/180,sx0=cen[0]+34*Math.cos(ang),sy0=cen[1]+34*Math.sin(ang);
      const tx=aPt[0]+Math.cos(k*1.7)*7,ty=aPt[1]+Math.sin(k*1.7)*7;
      const p=Math.max(0,Math.min(1,frac*1.5-i*0.08-k*0.14));
      s+=`<circle cx="${fmt(sx0+(tx-sx0)*p,1)}" cy="${fmt(sy0+(ty-sy0)*p,1)}" r="4.5" fill="#3b82f6"/>`;
    }
  }
  s+=`<g font-size="12" font-weight="bold" fill="var(--ink2)"><circle cx="62" cy="481" r="9" fill="#6b7f9e"/><text x="78" y="485">親水コロイド</text><circle cx="232" cy="481" r="5" fill="#3b82f6"/><text x="244" y="485">水和水</text><circle cx="342" cy="481" r="7" fill="#14b8a6"/><text x="356" y="485">電解質イオン</text></g>`;
  $('model-salt').innerHTML=s;
}
function drawSaltGraph(st){
  const w=520,hg=360,l=64,r=20,t=40,b=54,pw=w-l-r,ph=hg-t-b,xMax=5;
  const sx=x=>l+x/xMax*pw,sy=y=>t+ph-Math.max(0,Math.min(1,y))*ph;
  let s=`<text x="${w/2}" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="var(--ink)">凝集度と電解質濃度</text>`;
  for(const v of [0,0.5,1])s+=`<line x1="${l}" y1="${sy(v)}" x2="${l+pw}" y2="${sy(v)}" stroke="var(--grid)"/><text x="${l-9}" y="${sy(v)+4}" text-anchor="end" font-size="11" fill="var(--ink2)">${Math.round(v*100)}</text>`;
  for(const v of [1,2,3,4,5])s+=`<line x1="${sx(v)}" y1="${t}" x2="${sx(v)}" y2="${t+ph}" stroke="var(--grid)"/><text x="${sx(v)}" y="${t+ph+20}" text-anchor="middle" font-size="11" fill="var(--ink2)">${v}</text>`;
  s+=`<line x1="${l}" y1="${t+ph}" x2="${l+pw}" y2="${t+ph}" stroke="var(--axis)" stroke-width="1.5"/><line x1="${l}" y1="${t}" x2="${l}" y2="${t+ph}" stroke="var(--axis)" stroke-width="1.5"/>`;
  s+=`<text x="${l+pw/2}" y="${hg-8}" text-anchor="middle" font-size="13" fill="var(--ink)">電解質濃度 [mol/L]</text><text x="16" y="${t+ph/2}" text-anchor="middle" font-size="13" fill="var(--ink)" transform="rotate(-90 16 ${t+ph/2})">凝集度 [％]</text>`;
  const mk=(f,color,dash)=>{const pts=[];for(let i=0;i<=100;i++){const c=xMax*i/100;pts.push([c,f(c)]);}return`<path d="${pts.map((p,i)=>(i?'L':'M')+fmt(sx(p[0]),1)+' '+fmt(sy(p[1]),1)).join(' ')}" fill="none" stroke="${color}" stroke-width="3" ${dash?`stroke-dasharray="${dash}"`:''} stroke-linejoin="round"/>`;};
  const hydrophobic=c=>Math.max(0,Math.min(1,(c-0.02)/0.12)),hydrophilic=c=>Math.max(0,Math.min(1,(c-st.onset)/(st.cSalt-st.onset)));
  if(showSaltCompare){s+=mk(hydrophobic,'#f97316');s+=`<text x="${sx(0.35)}" y="${sy(1)-6}" font-size="11" font-weight="bold" fill="#ea580c">疎水（凝析）少量で凝集</text>`;}
  s+=mk(hydrophilic,'#7c3aed');
  s+=`<text x="${sx(Math.min(4.2,st.cSalt))}" y="${sy(0.55)-8}" font-size="11" font-weight="bold" fill="#7c3aed">親水（塩析）多量が必要</text>`;
  const cy=hydrophilic(st.conc);
  s+=`<line x1="${sx(st.conc)}" y1="${t+ph}" x2="${sx(st.conc)}" y2="${sy(cy)}" stroke="var(--accent)" stroke-dasharray="4 4"/><circle cx="${sx(st.conc)}" cy="${sy(cy)}" r="6" fill="var(--accent)" stroke="#fff" stroke-width="2"/>`;
  $('chart-salt').innerHTML=s;
}
function drawSalt(){
  const st=saltState();
  $('s-hydro-val').textContent=st.hydro;$('s-conc-val').textContent=fmt(st.conc,2);
  $('s-hydro-minus').disabled=st.hydro<=1;$('s-hydro-plus').disabled=st.hydro>=5;
  const sc=st.agg<0.05?'#2563eb':st.agg<0.85?'#f97316':'#dc2626';
  $('badges-salt').innerHTML=`<span class="badge"><strong style="color:${sc}">${st.status}</strong></span><span class="badge">電解質濃度 <strong>${fmt(st.conc,2)} mol/L</strong></span><span class="badge solution">塩析の目安 <strong>${fmt(st.cSalt,1)} mol/L</strong></span><span class="badge">水和の保持 <strong>${Math.round(st.shell*100)} ％</strong></span><span class="badge">例：豆腐・セッケン</span>`;
  drawSaltModel(st);drawSaltGraph(st);
}

// ===== ⑥ 保護コロイド（親水性の保護層で疎水コロイドを守る） =====
let showProtectShell=true;
function protectState(){
  const protect=+$('p-protect').value,conc=+$('p-conc').value,cov=protect/100;
  const baseCCC=8,effCCC=baseCCC*(1+0.9*protect/10);          // 保護量に応じて実効CCCが上昇
  const ratio=conc/effCCC,agg=Math.max(0,Math.min(1,(ratio-0.6)/0.5));
  const status=ratio<0.6?'分散（保護されている）':ratio<1?'凝析しやすい':'凝析';
  return{protect,conc,cov,baseCCC,effCCC,ratio,agg,status};
}

// ===== ⑦ 電気泳動（荷電した疎水コロイドの移動） =====
const ECOLLOIDS={fe:{name:'水酸化鉄(III)',sign:1,color:'#b45309',charge:'正'},clay:{name:'粘土',sign:-1,color:'#6b7280',charge:'負'},sulfur:{name:'硫黄',sign:-1,color:'#ca8a04',charge:'負'}};
let eColloid='fe',ePolarityReversed=false;
function electroState(){
  const volt=+$('e-volt').value,conc=+$('e-conc').value,time=+$('e-time').value,c=ECOLLOIDS[eColloid];
  const mobility=1/(1+0.05*conc);          // 電解質が増えると二重層が圧縮され移動度が低下
  const speed=mobility*volt/100,disp=Math.min(1,speed*(time/60));
  const anodeRight=!ePolarityReversed;      // 既定は右が陽極(＋)
  const goesRight=(c.sign<0)?anodeRight:!anodeRight; // 負→陽極、正→陰極
  return{volt,conc,time,c,mobility,speed,disp,anodeRight,goesRight};
}
// U字管に沿った移動経路（源の腕→底のチャンネル→目的の腕）
function ePathPt(t,sx,tx,armTopY,chY){
  if(t<0.30)return [sx,armTopY+(chY-armTopY)*(t/0.30)];
  if(t<0.70)return [sx+(tx-sx)*((t-0.30)/0.40),chY];
  return [tx,chY+(armTopY-chY)*((t-0.70)/0.30)];
}
// 板状の電極（薄い金属板を溶液に差し込む）
function ePlate(cx,color,sign,label){
  return `<rect x="${cx-13}" y="118" width="26" height="150" rx="3" fill="#b6bcc6" stroke="#4b5563" stroke-width="2"/><rect x="${cx-9}" y="123" width="6" height="141" rx="2" fill="#d8dce3"/><circle cx="${cx}" cy="101" r="14" fill="${color}"/><text x="${cx}" y="106" text-anchor="middle" font-size="17" font-weight="900" fill="#fff">${sign}</text><text x="${cx}" y="81" text-anchor="middle" font-size="13" font-weight="bold" fill="${color}">${label}</text>`;
}
function drawElectroModel(st){
  const c=st.c,col=c.color,sign=c.sign,ch=sign<0?'−':'＋',disp=st.disp;
  const lx0=200,lx1=330,rx0=450,rx1=580,topY=150,chTop=395,botY=452,baseline=290,travel=96;
  const d=disp*travel;let lB,rB;
  if(st.goesRight){rB=baseline-d;lB=baseline+d;}else{lB=baseline-d;rB=baseline+d;}
  const clamp=v=>Math.max(topY+14,Math.min(chTop-14,v));lB=clamp(lB);rB=clamp(rB);
  const Lx=(lx0+lx1)/2,Rx=(rx0+rx1)/2,chY=(chTop+botY)/2;
  let s=`<defs><marker id="electro-arrow" viewBox="0 0 9 9" refX="8" refY="4.5" markerWidth="7" markerHeight="7" orient="auto"><path d="M 0 0 L 9 4.5 L 0 9 Z" fill="${col}"/></marker></defs>`;
  s+=`<text x="390" y="34" text-anchor="middle" font-size="22" font-weight="900" fill="${col}">${c.name}（${c.charge}コロイド）</text>`;
  s+=`<text x="390" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--ink2)">${st.volt<=0?'電圧 0：移動しない':(sign>0?'正コロイドは陰極(−)へ移動':'負コロイドは陽極(＋)へ移動')}</text>`;
  // 溶媒（無色）と色付きコロイド溶液（境界が移動）
  s+=`<rect x="${lx0}" y="${topY}" width="${lx1-lx0}" height="${botY-topY}" fill="#f4f8fd"/><rect x="${rx0}" y="${topY}" width="${rx1-rx0}" height="${botY-topY}" fill="#f4f8fd"/>`;
  s+=`<rect x="${lx0}" y="${chTop}" width="${rx1-lx0}" height="${botY-chTop}" fill="${col}" opacity="0.24"/>`;
  s+=`<rect x="${lx0}" y="${fmt(lB,1)}" width="${lx1-lx0}" height="${fmt(chTop-lB,1)}" fill="${col}" opacity="0.24"/>`;
  s+=`<rect x="${rx0}" y="${fmt(rB,1)}" width="${rx1-rx0}" height="${fmt(chTop-rB,1)}" fill="${col}" opacity="0.24"/>`;
  s+=`<line x1="${lx0}" y1="${fmt(lB,1)}" x2="${lx1}" y2="${fmt(lB,1)}" stroke="${col}" stroke-width="2.5"/><line x1="${rx0}" y1="${fmt(rB,1)}" x2="${rx1}" y2="${fmt(rB,1)}" stroke="${col}" stroke-width="2.5"/>`;
  // 移動する粒子（同じ粒子が経路上を連続移動：消えたり現れたりしない）
  const srcX=st.goesRight?Lx:Rx,tgtX=st.goesRight?Rx:Lx,N=12;
  for(let i=0;i<N;i++){
    const base=0.06+0.82*(i/(N-1));
    const t=Math.max(0.03,Math.min(0.97,base+disp*0.9));
    const p=ePathPt(t,srcX,tgtX,baseline-4,chY);
    const px=p[0]+((i%5)-2)*11,py=p[1]+(((i*7)%5)-2)*7;
    s+=`<circle cx="${fmt(px,1)}" cy="${fmt(py,1)}" r="8" fill="${col}" stroke="#1f2937" stroke-width="1.5"/><text x="${fmt(px,1)}" y="${fmt(py+3.4,1)}" text-anchor="middle" font-size="10" font-weight="900" fill="#fff">${ch}</text>`;
  }
  // 管の外形と仕切り
  s+=`<path d="M ${lx0} ${topY} V ${botY} H ${rx1} V ${topY}" fill="none" stroke="#334155" stroke-width="3"/><path d="M ${lx1} ${topY} V ${chTop} H ${rx0} V ${topY}" fill="none" stroke="#334155" stroke-width="3"/>`;
  // 板状の電極
  const anodeRight=st.anodeRight;
  const leftColor=anodeRight?'#2563eb':'#dc2626',rightColor=anodeRight?'#dc2626':'#2563eb';
  s+=ePlate(Lx,leftColor,anodeRight?'−':'＋',anodeRight?'陰極':'陽極')+ePlate(Rx,rightColor,anodeRight?'＋':'−',anodeRight?'陽極':'陰極');
  // 移動方向の矢印（腕の間の空きスペースに表示）
  if(st.volt>0&&disp>0.01){const dir=st.goesRight?1:-1;s+=`<line x1="${390-dir*40}" y1="250" x2="${390+dir*40}" y2="250" stroke="${col}" stroke-width="4" marker-end="url(#electro-arrow)"/><text x="390" y="236" text-anchor="middle" font-size="12" font-weight="bold" fill="${col}">コロイドが移動</text>`;}
  s+=`<text x="390" y="${botY+30}" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--ink2)">${c.name}（表面電荷 ${c.charge}）を含む溶液の色が ${st.volt<=0?'—':(st.goesRight?'右':'左')}の電極側へ移動する</text>`;
  $('model-electro').innerHTML=s;
}
function buildEColloidRow(){
  const row=$('e-colloid-row');row.innerHTML='';
  Object.entries(ECOLLOIDS).forEach(([key,c])=>{
    const b=document.createElement('button');b.type='button';b.textContent=c.name;b.dataset.key=key;b.setAttribute('aria-pressed',String(key===eColloid));
    b.addEventListener('click',()=>{eColloid=key;[...row.children].forEach(x=>x.setAttribute('aria-pressed',String(x.dataset.key===eColloid)));drawElectro();});
    row.appendChild(b);
  });
}
function drawElectro(){
  const st=electroState();
  $('e-volt-val').textContent=st.volt;$('e-conc-val').textContent=fmt(st.conc,1);$('e-time-val').textContent=st.time;
  $('badges-electro').innerHTML=`<span class="badge">コロイド <strong style="color:${st.c.color}">${st.c.name}</strong></span><span class="badge">電荷 <strong>${st.c.charge}</strong></span><span class="badge solution">移動先 <strong>${st.volt<=0?'—':(st.c.sign>0?'陰極(−)':'陽極(＋)')}</strong></span><span class="badge">移動速度 <strong>${fmt(st.mobility*st.volt/100,2)}（相対）</strong></span>`;
  drawElectroModel(st);
}

// 新タブのイベント配線
$('toggle-salt-water').addEventListener('click',ev=>{showSaltWater=!showSaltWater;ev.currentTarget.setAttribute('aria-pressed',String(showSaltWater));ev.currentTarget.textContent=`水和水：${showSaltWater?'表示':'非表示'}`;drawSalt();});
$('toggle-salt-compare').addEventListener('click',ev=>{showSaltCompare=!showSaltCompare;ev.currentTarget.setAttribute('aria-pressed',String(showSaltCompare));ev.currentTarget.textContent=`疎水の凝析と比較：${showSaltCompare?'表示':'非表示'}`;drawSalt();});
$('toggle-protect-shell').addEventListener('click',ev=>{showProtectShell=!showProtectShell;ev.currentTarget.setAttribute('aria-pressed',String(showProtectShell));ev.currentTarget.textContent=`保護層：${showProtectShell?'表示':'非表示'}`;drawProtect();});
$('toggle-electro-polarity').addEventListener('click',ev=>{ePolarityReversed=!ePolarityReversed;ev.currentTarget.setAttribute('aria-pressed',String(ePolarityReversed));ev.currentTarget.textContent=ePolarityReversed?'極性：反転中':'極性を反転';drawElectro();});
$('s-hydro-minus').addEventListener('click',()=>{const i=$('s-hydro');i.value=Math.max(1,+i.value-1);drawSalt();});
$('s-hydro-plus').addEventListener('click',()=>{const i=$('s-hydro');i.value=Math.min(5,+i.value+1);drawSalt();});
$('s-conc').addEventListener('input',drawSalt);
['p-protect','p-conc'].forEach(id=>$(id).addEventListener('input',drawProtect));
['e-volt','e-conc','e-time'].forEach(id=>$(id).addEventListener('input',drawElectro));
document.querySelector('.reset-btn[data-reset="electro"]').addEventListener('click',()=>{eColloid='fe';ePolarityReversed=false;$('toggle-electro-polarity').setAttribute('aria-pressed','false');$('toggle-electro-polarity').textContent='極性を反転';buildEColloidRow();drawElectro();});

drawBoiling();drawFreezing();drawOsmosis();drawColloid();
buildEColloidRow();drawSalt();drawProtect();drawElectro();
</script>
