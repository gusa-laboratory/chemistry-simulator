  [...this.model.bonds].sort((u,v)=>(p[u.a].z+p[u.b].z)-(p[v.a].z+p[v.b].z)).forEach(b=>{const a=p[b.a],z=p[b.b],dx=z.x-a.x,dy=z.y-a.y,len=Math.hypot(dx,dy)||1,nx=-dy/len,ny=dx/len;for(let k=0;k<b.o;k++){const off=(k-(b.o-1)/2)*10*s;this.ctx.beginPath();this.ctx.moveTo(a.x+nx*off,a.y+ny*off);this.ctx.lineTo(z.x+nx*off,z.y+ny*off);this.ctx.strokeStyle='#64748b';this.ctx.lineWidth=(b.o===1?9:6)*s;this.ctx.lineCap='round';this.ctx.stroke()}});
  if(state.repulsion)this.drawRepulsion();
  if(state.angles)this.drawAngleGuides(false);
  if(state.electrons)this.drawSharedElectronDots(p);
  this.model.atoms.map((a,i)=>i).sort((i,j)=>p[i].z-p[j].z).forEach(i=>{const a=this.model.atoms[i],q=p[i],r=radii[a.e]*2.8*q.scale*s,gr=this.ctx.createRadialGradient(q.x-r*.34,q.y-r*.38,r*.12,q.x,q.y,r);gr.addColorStop(0,'#fff');gr.addColorStop(.24,colors[a.e]);gr.addColorStop(1,outlines[a.e]);this.ctx.beginPath();this.ctx.arc(q.x,q.y,r,0,Math.PI*2);this.ctx.fillStyle=gr;this.ctx.fill();this.ctx.strokeStyle=outlines[a.e];this.ctx.lineWidth=1.4*s;this.ctx.stroke();this.ctx.fillStyle=a.e==='H'?'#475569':'#fff';this.ctx.font=`800 ${(a.e.length>1?23:26)*s}px Inter,Arial`;this.ctx.textAlign='center';this.ctx.textBaseline='middle';this.ctx.fillText(a.e,q.x,q.y+.5*s)});if(state.angles)this.drawAngleGuides(true)
 }
}

const tabs=document.getElementById('moleculeTabs'),compareSwitch=document.getElementById('compareSwitch');
Object.entries(molecules).forEach(([key,m],i)=>{const b=document.createElement('button');b.type='button';b.id=`tab-${key}`;b.dataset.molecule=key;b.setAttribute('role','tab');b.setAttribute('aria-controls','moleculePanel');b.setAttribute('aria-selected',i===0);b.tabIndex=i===0?0:-1;b.textContent=m.label;tabs.insertBefore(b,compareSwitch)});
const formulaHost=document.getElementById('formulaHost'),facts=document.getElementById('facts'),title=document.getElementById('moleculeTitle'),formulaLabel=document.getElementById('formulaLabel'),live=document.getElementById('live'),electronToggle=document.getElementById('electronToggle'),repulsionToggle=document.getElementById('repulsionToggle'),angleToggle=document.getElementById('angleToggle'),electronKey=document.getElementById('electronKey'),sharedLegend=document.getElementById('sharedLegend'),loneLegend=document.getElementById('loneLegend'),repulsionLegend=document.getElementById('repulsionLegend'),moleculePanel=document.getElementById('moleculePanel'),comparisonPanel=document.getElementById('comparisonPanel'),comparisonTitle=document.getElementById('comparisonTitle'),compareGrid=document.getElementById('compareGrid');
const view=new VSEPRView(document.getElementById('molCanvas'));
let compareViews=[];
function activeModels(){return state.compare==='none'?[molecules[state.molecule]]:compareSets[state.compare].keys.map(key=>molecules[key])}
function repulsionAvailable(){return activeModels().some(model=>model.vsepr.some(group=>group.bonds.length+group.lone.length>=2))}
function angleAvailable(){return activeModels().some(model=>model.angleGuides?.length)}
function updateLegend(){const available=repulsionAvailable(),angle=angleAvailable();sharedLegend.hidden=!state.electrons;loneLegend.hidden=!state.electrons;repulsionLegend.hidden=!state.repulsion||!available;electronKey.hidden=!state.electrons&&(!state.repulsion||!available);repulsionToggle.disabled=!available;repulsionToggle.setAttribute('aria-pressed',available&&state.repulsion);repulsionToggle.textContent=available?`反発矢印 ${state.repulsion?'ON':'OFF'}`:'反発対象なし';angleToggle.disabled=!angle;angleToggle.setAttribute('aria-pressed',angle&&state.angles);angleToggle.textContent=angle?`結合角 ${state.angles?'ON':'OFF'}`:'結合角対象なし'}
function drawViews(){view.draw();compareViews.forEach(item=>item.view.draw())}
function resizeViews(){view.resize();compareViews.forEach(item=>item.view.resize())}
function renderComparison(){const set=compareSets[state.compare];comparisonTitle.textContent=set.title;compareGrid.replaceChildren();compareViews=[];set.keys.forEach(key=>{const m=molecules[key],card=document.createElement('article');card.className='compare-card';card.innerHTML=`<div class="compare-head"><h3>${m.label}　${m.name}</h3></div><div class="compare-facts"><span>電子領域：${m.domainCount}</span><span>${m.electronShape}</span><span>${m.shape}</span><span>${m.angle}</span></div><div class="compare-canvas-wrap"><canvas class="compare-canvas" tabindex="0" aria-label="${m.label}の3D VSEPRモデル。ドラッグまたは矢印キーで回転"></canvas><span class="canvas-help">ドラッグ：回転　ホイール：拡大</span></div>`;compareGrid.appendChild(card);const compareView=new VSEPRView(card.querySelector('canvas'));compareView.setModel(m);compareViews.push({key,card,view:compareView})});requestAnimationFrame(resizeViews)}
function setCompare(mode){state.compare=mode;const active=mode!=='none';tabs.querySelectorAll('[role="tab"]').forEach(button=>{const selected=active&&button.dataset.compare===mode;button.setAttribute('aria-selected',selected);button.tabIndex=selected?0:-1});document.body.classList.toggle('comparison-mode',active);comparisonPanel.hidden=!active;if(active){comparisonPanel.setAttribute('aria-labelledby',`tab-compare-${mode}`);renderComparison()}else{compareViews=[];compareGrid.replaceChildren();requestAnimationFrame(()=>view.resize())}updateLegend();live.textContent=active?`${compareSets[mode].title}の比較表示に切り替えました`:'個別表示に戻しました'}
function render(){const m=molecules[state.molecule];title.textContent=`${m.label}　${m.name}`;facts.innerHTML=`<span class="fact">電子領域数：${m.domainCount}</span><span class="fact">電子領域の形：${m.electronShape}</span><span class="fact">分子の形：${m.shape}</span><span class="fact">結合角：${m.angle}</span><span class="fact">電子対：${m.domains}</span>`;formulaHost.innerHTML=formulaSVG(state.molecule,state.formula==='lewis');formulaLabel.textContent=state.formula==='lewis'?'2D 電子式':'2D 構造式';updateLegend();view.setModel(m);requestAnimationFrame(()=>view.resize())}
function selectMolecule(btn,focus=false){if(state.compare!=='none')setCompare('none');state.molecule=btn.dataset.molecule;tabs.querySelectorAll('[role="tab"]').forEach(b=>{const active=b===btn;b.setAttribute('aria-selected',active);b.tabIndex=active?0:-1});moleculePanel.setAttribute('aria-labelledby',btn.id);render();if(focus)btn.focus();live.textContent=`${btn.textContent}を表示しました`}
function activateTab(btn,focus=false){if(btn.dataset.compare)setCompare(btn.dataset.compare);else selectMolecule(btn);if(focus)btn.focus()}
tabs.querySelectorAll('[role="tab"]').forEach(btn=>btn.addEventListener('click',()=>activateTab(btn)));
tabs.addEventListener('keydown',e=>{if(!['ArrowLeft','ArrowRight','Home','End'].includes(e.key))return;const buttons=[...tabs.querySelectorAll('[role="tab"]')],current=buttons.indexOf(document.activeElement);if(current<0)return;e.preventDefault();let next=e.key==='Home'?0:e.key==='End'?buttons.length-1:(current+(e.key==='ArrowRight'?1:-1)+buttons.length)%buttons.length;activateTab(buttons[next],true)});
document.querySelectorAll('.view-switch button[data-view]').forEach(btn=>btn.addEventListener('click',()=>{document.body.dataset.view=btn.dataset.view;document.querySelectorAll('.view-switch button[data-view]').forEach(b=>b.setAttribute('aria-pressed',b===btn));live.textContent=`表示を${btn.textContent}に切り替えました`;requestAnimationFrame(()=>view.resize())}));
document.querySelectorAll('[data-formula]').forEach(btn=>btn.addEventListener('click',()=>{state.formula=btn.dataset.formula;document.querySelectorAll('[data-formula]').forEach(b=>b.setAttribute('aria-pressed',b===btn));formulaHost.innerHTML=formulaSVG(state.molecule,state.formula==='lewis');formulaLabel.textContent=state.formula==='lewis'?'2D 電子式':'2D 構造式';live.textContent=`${btn.textContent}を表示しました`}));
electronToggle.addEventListener('click',()=>{state.electrons=!state.electrons;electronToggle.setAttribute('aria-pressed',state.electrons);electronToggle.textContent=`電子対表示 ${state.electrons?'ON':'OFF'}`;updateLegend();drawViews();live.textContent=`電子対を${state.electrons?'表示':'非表示'}にしました`});
repulsionToggle.addEventListener('click',()=>{state.repulsion=!state.repulsion;repulsionToggle.setAttribute('aria-pressed',state.repulsion);repulsionToggle.textContent=`反発矢印 ${state.repulsion?'ON':'OFF'}`;updateLegend();drawViews();live.textContent=`反発矢印を${state.repulsion?'表示':'非表示'}にしました`});
angleToggle.addEventListener('click',()=>{state.angles=!state.angles;updateLegend();drawViews();live.textContent=`結合角を${state.angles?'表示':'非表示'}にしました`});
document.getElementById('resetView').addEventListener('click',()=>view.reset());
const ro=new ResizeObserver(resizeViews);ro.observe(document.body);
const fs=document.getElementById('fullscreenBtn');fs.addEventListener('click',async()=>{try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen();else await document.exitFullscreen()}catch(e){live.textContent='このブラウザでは全画面表示を開始できませんでした'}});document.addEventListener('fullscreenchange',()=>{const active=!!document.fullscreenElement;document.body.classList.toggle('is-fullscreen',active);if(active)window.scrollTo(0,0);fs.querySelector('.btn-text').textContent=active?'全画面を終了':'全画面表示';fs.setAttribute('aria-label',active?'全画面を終了':'全画面表示');requestAnimationFrame(resizeViews)});
render();
</script>
<script src="site-shell.js"></script>
</body>
</html>
