<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化学インタラクティブ教材｜Interactive Lab</title>
<meta name="description" content="原子・イオン半径、分子の形、気体の法則、希薄溶液、コロイド、結晶格子を動かして学ぶ授業投影用インタラクティブ教材。">
<meta name="theme-color" content="#2563eb">
<link rel="icon" href="icons/icon-192.png">
<style>
  :root {
    --curve: #2563eb; --accent: #f97316; --ink: #172033; --ink2: #526078; --ink3: #8995a9;
    --bg: #f3f6fb; --card: #fff; --border: #dce4f0; --blue-soft: #edf4ff; --blue-deep: #173b75;
    --shadow: 0 18px 45px rgba(31,55,89,.10); --shadow-sm: 0 7px 22px rgba(31,55,89,.075);
  }
  * { box-sizing: border-box; }
  html { min-width: 320px; }
  body {
    margin: 0; min-height: 100vh; color: var(--ink);
    font-family: Inter, 'Yu Gothic UI', 'Yu Gothic', Meiryo, sans-serif;
    -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(circle at 6% -6%, rgba(37,99,235,.13), transparent 27rem),
      radial-gradient(circle at 96% 2%, rgba(14,165,233,.09), transparent 25rem),
      linear-gradient(180deg, #f6f9fd 0, var(--bg) 30rem);
  }
  header { padding: 40px clamp(18px, 5vw, 60px) 0; }
  .wrap { max-width: 1080px; margin: 0 auto; }
  .badge {
    display: inline-block; margin-bottom: 12px; padding: 5px 11px; border-radius: 999px;
    background: var(--blue-soft); color: var(--curve);
    font: 800 11px/1 Inter, Arial, sans-serif; letter-spacing: .14em;
  }
  h1 { margin: 0; font-size: clamp(26px, 4vw, 40px); font-weight: 800; letter-spacing: -.03em; color: var(--blue-deep); }
  main { padding: 34px clamp(18px, 5vw, 60px) 60px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 11px; max-width: 900px; }
  .sim {
    display: flex; flex-direction: row; align-items: center; gap: 16px; text-decoration: none; color: inherit;
    background: var(--card); border: 1px solid var(--border); border-radius: 22px;
    height: 76px; padding: 14px 22px; box-shadow: var(--shadow); position: relative; overflow: hidden;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .sim::after {
    content: ''; position: absolute; right: -40px; top: -46px; width: 130px; height: 130px;
    border: 22px solid rgba(37,99,235,.05); border-radius: 50%;
  }
  .sim:hover { transform: translateY(-4px); border-color: #b7cdf0; box-shadow: 0 26px 60px rgba(31,55,89,.16); }
  .sim:focus-visible { outline: 3px solid rgba(37,99,235,.32); outline-offset: 3px; }
  .sim .ico { width: 48px; display: grid; place-items: center; font-size: 35px; line-height: 1; flex: 0 0 auto; }
  .sim .ico svg { display: block; width: 46px; height: 46px; }
  .sim-body { position: relative; z-index: 1; flex: 1; min-width: 0; display: grid; grid-template-columns: minmax(190px, .7fr) minmax(280px, 1.3fr); align-items: center; gap: 18px; }
  .sim h2 { margin: 0; font-size: 19px; font-weight: 800; color: var(--blue-deep); }
  .sim-desc { margin: 0; color: var(--ink2); font-size: 13px; line-height: 1.55; font-weight: 600; }
  .credit { max-width: 1080px; margin: 0 auto; padding: 8px clamp(18px, 5vw, 60px) 40px; text-align: center; color: #dbe0e8; font-size: 10.5px; font-weight: 500; letter-spacing: .05em; }
  @media (max-width: 560px) {
    header { padding-top: 28px; } main { padding-top: 24px; }
    .grid { gap: 11px; }
    .sim { height: 86px; padding: 11px 17px; gap: 13px; }
    .sim .ico { width: 40px; font-size: 31px; }
    .sim .ico svg { width: 40px; height: 40px; }
    .sim-body { grid-template-columns: 1fr; gap: 3px; }
    .sim h2 { font-size: 17px; }
    .sim-desc { font-size: 11.5px; line-height: 1.45; }
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>化学インタラクティブ教材</h1>
  </div>
</header>
<main class="wrap">
  <div class="grid">
    <a class="sim" href="atomic-ionic-radii.html">
      <div class="ico" aria-hidden="true">
        <svg viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="22" fill="none" stroke="#8da3bd" stroke-width="1.8"/>
          <circle cx="28" cy="28" r="15" fill="none" stroke="#8da3bd" stroke-width="1.8"/>
          <circle cx="28" cy="28" r="9" fill="#d91636" stroke="#8b1027" stroke-width="1.5"/>
          <circle cx="28" cy="6" r="3.2" fill="#38bdf8" stroke="#153047" stroke-width="1.2"/>
          <circle cx="43" cy="28" r="3.2" fill="#38bdf8" stroke="#153047" stroke-width="1.2"/>
          <circle cx="13" cy="28" r="3.2" fill="#38bdf8" stroke="#153047" stroke-width="1.2"/>
          <circle cx="28" cy="43" r="3.2" fill="#38bdf8" stroke="#153047" stroke-width="1.2"/>
          <circle cx="23.5" cy="23.5" r="2.1" fill="#fff" opacity=".68"/>
        </svg>
      </div>
      <div class="sim-body">
        <h2>原子半径・イオン半径</h2>
        <p class="sim-desc">電子配置と核電荷を見比べ、原子・イオン半径の周期性を比較。</p>
      </div>
    </a>
    <a class="sim" href="molecular-shapes.html">
      <div class="ico" aria-hidden="true">
        <svg viewBox="0 0 56 56">
          <path d="M28 27 12 42M28 27l18 14" fill="none" stroke="#8da3bd" stroke-width="7" stroke-linecap="round"/>
          <circle cx="28" cy="25" r="11" fill="#ef4444"/>
          <circle cx="11" cy="43" r="8" fill="#f8fafc" stroke="#9fb0c5" stroke-width="2"/>
          <circle cx="46" cy="42" r="8" fill="#f8fafc" stroke="#9fb0c5" stroke-width="2"/>
          <circle cx="24" cy="21" r="3" fill="#fff" opacity=".72"/>
        </svg>
      </div>
      <div class="sim-body">
        <h2>分子の形</h2>
        <p class="sim-desc">構造式と3Dモデルを見比べ、電子対の反発と結合角を確認。</p>
      </div>
    </a>
    <a class="sim" href="crystals.html">
      <div class="ico">💎</div>
      <div class="sim-body">
        <h2>結晶格子</h2>
        <p class="sim-desc">単位格子を回転し、配位数・充填率・断面を立体的に理解。</p>
      </div>
    </a>
    <a class="sim" href="gas-laws.html">
      <div class="ico">🎈</div>
      <div class="sim-body">
        <h2>気体の法則</h2>
        <p class="sim-desc">状態量を動かし、グラフと粒子モデルの変化を同時に観察。</p>
      </div>
    </a>
    <a class="sim" href="solutions.html">
      <div class="ico">🧪</div>
      <div class="sim-body">
        <h2>希薄溶液・コロイド</h2>
        <p class="sim-desc">束一的性質とコロイドの挙動をグラフ・模式図で確認。</p>
      </div>
    </a>
  </div>
</main>
<footer class="credit">大阪女学院中学校・高等学校　Yuto Yamaguchi</footer>
</body>
</html>
