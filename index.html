<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化学シミュレーター｜Interactive Lab</title>
<meta name="description" content="気体の法則・希薄溶液・コロイド・結晶格子をスライダーで動かして学ぶ、授業投影用インタラクティブ教材。">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="化学シミュレーター">
<style>
  :root {
    --curve: #2563eb; --accent: #f97316; --ink: #172033; --ink2: #526078; --ink3: #8995a9;
    --bg: #f3f6fb; --card: #fff; --border: #dce4f0; --blue-soft: #edf4ff; --blue-deep: #173b75;
    --shadow: 0 18px 45px rgba(31,55,89,.10); --shadow-sm: 0 7px 22px rgba(31,55,89,.075);
  }
  * { box-sizing: border-box; }
  html { min-width: 320px; }
  body {
    margin: 0; min-height: 100vh; color: var(--ink);
    font-family: Inter, 'Yu Gothic UI', 'Yu Gothic', Meiryo, sans-serif;
    -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(circle at 6% -6%, rgba(37,99,235,.13), transparent 27rem),
      radial-gradient(circle at 96% 2%, rgba(14,165,233,.09), transparent 25rem),
      linear-gradient(180deg, #f6f9fd 0, var(--bg) 30rem);
  }
  header { padding: 40px clamp(18px, 5vw, 60px) 0; }
  .wrap { max-width: 1080px; margin: 0 auto; }
  .badge {
    display: inline-block; margin-bottom: 12px; padding: 5px 11px; border-radius: 999px;
    background: var(--blue-soft); color: var(--curve);
    font: 800 11px/1 Inter, Arial, sans-serif; letter-spacing: .14em;
  }
  h1 { margin: 0; font-size: clamp(26px, 4vw, 40px); font-weight: 800; letter-spacing: -.03em; color: var(--blue-deep); }
  .subtitle { margin: 12px 0 0; color: var(--ink2); font-size: clamp(14px, 1.8vw, 17px); line-height: 1.7; font-weight: 600; }
  main { padding: 34px clamp(18px, 5vw, 60px) 60px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 22px; }
  .sim {
    display: flex; flex-direction: row; align-items: center; gap: 18px; text-decoration: none; color: inherit;
    background: var(--card); border: 1px solid var(--border); border-radius: 22px;
    padding: 22px 26px; box-shadow: var(--shadow); position: relative; overflow: hidden;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .sim::after {
    content: ''; position: absolute; right: -40px; top: -46px; width: 130px; height: 130px;
    border: 22px solid rgba(37,99,235,.05); border-radius: 50%;
  }
  .sim:hover { transform: translateY(-4px); border-color: #b7cdf0; box-shadow: 0 26px 60px rgba(31,55,89,.16); }
  .sim:focus-visible { outline: 3px solid rgba(37,99,235,.32); outline-offset: 3px; }
  .sim .ico { font-size: 40px; line-height: 1; flex: 0 0 auto; }
  .sim h2 { margin: 0; font-size: 20px; font-weight: 800; color: var(--blue-deep); }
  .sim .eyebrow { font: 800 11px/1 Inter, Arial, sans-serif; letter-spacing: .12em; color: var(--curve); margin-bottom: 10px; }
  .sim p { margin: 8px 0 16px; color: var(--ink2); font-size: 14px; line-height: 1.7; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
  .chip { padding: 4px 9px; border-radius: 8px; background: #f0f5fb; color: #445771; font-size: 11.5px; font-weight: 700; }
  .go { display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; color: var(--curve); font-weight: 800; font-size: 14px; }
  .go::after { content: '→'; transition: transform .18s ease; }
  .sim:hover .go::after { transform: translateX(4px); }
  .foot { max-width: 1080px; margin: 0 auto; padding: 4px clamp(18px, 5vw, 60px) 40px; }
  .foot-row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px 18px; color: var(--ink3); font-size: 12.5px; }
  .foot-row .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.2); }
  #install {
    display: none; align-items: center; gap: 8px; margin-left: auto; padding: 9px 15px;
    border: 1px solid #bfd0e7; border-radius: 12px; background: #fff; color: var(--blue-deep);
    font-family: inherit; font-size: 13px; font-weight: 800; cursor: pointer; box-shadow: var(--shadow-sm);
    transition: .18s ease;
  }
  #install::before { content: '⤓'; font-size: 16px; }
  #install:hover { color: var(--curve); border-color: #8fb0df; transform: translateY(-1px); }
  @media (max-width: 560px) { header { padding-top: 28px; } main { padding-top: 24px; } }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <span class="badge">CHEMISTRY LAB</span>
    <h1>化学シミュレーター</h1>
    <p class="subtitle">スライダーを動かすと、グラフ・数値・粒子モデルが同時に変化。授業でそのまま投影して使えるインタラクティブ教材です。</p>
  </div>
</header>
<main class="wrap">
  <div class="grid">
    <a class="sim" href="crystals.html">
      <div class="ico">💎</div>
      <h2>結晶格子シミュレーター</h2>
    </a>
    <a class="sim" href="gas-laws.html">
      <div class="ico">🎈</div>
      <h2>気体の法則シミュレーター</h2>
    </a>
    <a class="sim" href="solutions.html">
      <div class="ico">🧪</div>
      <h2>希薄溶液・コロイド シミュレーター</h2>
    </a>
  </div>
</main>
<div class="foot">
  <div class="foot-row">
    <span class="dot"></span>
    <span>オフライン対応（インストールすると通信なしで起動）</span>
    <button id="install" type="button">アプリとしてインストール</button>
  </div>
</div>

<script>
  // Service Worker 登録（PWA：オフライン起動・ホーム追加）
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }
  // インストール導線（対応ブラウザのみボタンを出す）
  let deferred = null;
  const btn = document.getElementById('install');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); deferred = e; btn.style.display = 'inline-flex';
  });
  btn.addEventListener('click', async () => {
    if (!deferred) return;
    deferred.prompt(); await deferred.userChoice; deferred = null; btn.style.display = 'none';
  });
  window.addEventListener('appinstalled', () => { btn.style.display = 'none'; });
</script>
</body>
</html>
