<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化学インタラクティブ教材｜Interactive Lab</title>
<meta name="description" content="気体の法則・希薄溶液・コロイド・結晶格子をスライダーで動かして学ぶ、授業投影用インタラクティブ教材。">
<meta name="theme-color" content="#2563eb">
<link rel="icon" href="icons/icon-192.png">
<style>
  :root {
    --curve: #2563eb; --accent: #f97316; --ink: #172033; --ink2: #526078; --ink3: #8995a9;
    --bg: #f3f6fb; --card: #fff; --border: #dce4f0; --blue-soft: #edf4ff; --blue-deep: #173b75;
    --shadow: 0 18px 45px rgba(31,55,89,.10); --shadow-sm: 0 7px 22px rgba(31,55,89,.075);
  }
  * { box-sizing: border-box; }
  html { min-width: 320px; }
  body {
    margin: 0; min-height: 100vh; color: var(--ink);
    font-family: Inter, 'Yu Gothic UI', 'Yu Gothic', Meiryo, sans-serif;
    -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(circle at 6% -6%, rgba(37,99,235,.13), transparent 27rem),
      radial-gradient(circle at 96% 2%, rgba(14,165,233,.09), transparent 25rem),
      linear-gradient(180deg, #f6f9fd 0, var(--bg) 30rem);
  }
  header { padding: 40px clamp(18px, 5vw, 60px) 0; }
  .wrap { max-width: 1080px; margin: 0 auto; }
  .badge {
    display: inline-block; margin-bottom: 12px; padding: 5px 11px; border-radius: 999px;
    background: var(--blue-soft); color: var(--curve);
    font: 800 11px/1 Inter, Arial, sans-serif; letter-spacing: .14em;
  }
  h1 { margin: 0; font-size: clamp(26px, 4vw, 40px); font-weight: 800; letter-spacing: -.03em; color: var(--blue-deep); }
  .subtitle { margin: 12px 0 0; color: var(--ink2); font-size: clamp(14px, 1.8vw, 17px); line-height: 1.7; font-weight: 600; }
  main { padding: 34px clamp(18px, 5vw, 60px) 60px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 22px; }
  .sim {
    display: flex; flex-direction: row; align-items: center; gap: 18px; text-decoration: none; color: inherit;
    background: var(--card); border: 1px solid var(--border); border-radius: 22px;
    padding: 22px 26px; box-shadow: var(--shadow); position: relative; overflow: hidden;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .sim::after {
    content: ''; position: absolute; right: -40px; top: -46px; width: 130px; height: 130px;
    border: 22px solid rgba(37,99,235,.05); border-radius: 50%;
  }
  .sim:hover { transform: translateY(-4px); border-color: #b7cdf0; box-shadow: 0 26px 60px rgba(31,55,89,.16); }
  .sim:focus-visible { outline: 3px solid rgba(37,99,235,.32); outline-offset: 3px; }
  .sim .ico { font-size: 40px; line-height: 1; flex: 0 0 auto; }
  .sim h2 { margin: 0; font-size: 20px; font-weight: 800; color: var(--blue-deep); }
  .credit { max-width: 1080px; margin: 0 auto; padding: 8px clamp(18px, 5vw, 60px) 40px; text-align: center; color: #dbe0e8; font-size: 10.5px; font-weight: 500; letter-spacing: .05em; }
  @media (max-width: 560px) {
    header { padding-top: 28px; } main { padding-top: 24px; }
    .grid { gap: 14px; }
    .sim { padding: 18px 20px; gap: 14px; }
    .sim .ico { font-size: 34px; }
    .sim h2 { font-size: 17px; }
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>化学インタラクティブ教材</h1>
    <p class="subtitle">スライダーを動かすと、グラフ・数値・粒子モデルが同時に変化。授業でそのまま投影して使えるインタラクティブ教材です。</p>
  </div>
</header>
<main class="wrap">
  <div class="grid">
    <a class="sim" href="crystals.html">
      <div class="ico">💎</div>
      <h2>結晶格子</h2>
    </a>
    <a class="sim" href="gas-laws.html">
      <div class="ico">🎈</div>
      <h2>気体の法則</h2>
    </a>
    <a class="sim" href="solutions.html">
      <div class="ico">🧪</div>
      <h2>希薄溶液・コロイド</h2>
    </a>
  </div>
</main>
<footer class="credit">大阪女学院中学校・高等学校　Yuto Yamaguchi</footer>
</body>
</html>
