<script>
(()=>{
const root=document.body;
const pos={
  linear:[[-1.35,0,0],[1.35,0,0]],
  square:[[1.18,0,0],[-1.18,0,0],[0,1.18,0],[0,-1.18,0]],
  tetra:[[.88,.88,.88],[-.88,-.88,.88],[-.88,.88,-.88],[.88,-.88,-.88]],
  oct:[[1.15,0,0],[-1.15,0,0],[0,1.15,0],[0,-1.15,0],[0,0,1.15],[0,0,-1.15]]
};
const ligandLabel={NH3:'NH₃',H2O:'H₂O',OH:'OH⁻',CN:'CN⁻',Cl:'Cl⁻',enN:'N',edtaN:'N',edtaO:'O',oxo:'O²⁻',A:'A',B:'B'};

const ligandCharge={NH3:0,H2O:0,OH:-1,CN:-1,Cl:-1,enN:0,edtaN:0,edtaO:0,oxo:-2};
const sub=s=>ligandLabel[s]||s;
const centerLabel=m=>m.centerLabel||metalLabel[m.metal]||m.metal;
const complex=(id,name,formula,metal,geometry,ligands,extra={})=>({id,name,formula,metal,geometry,ligands,...extra});
const all=(type,n)=>Array(n).fill(type);
const lessons=[
 {id:'cn2',tab:'① 配位数2',title:'配位数2：直線形',sets:[{id:'ag',label:'ジアンミン銀(I)',cards:[complex('ag-linear','ジアンミン銀(I)イオン','[Ag(NH₃)₂]⁺','Ag','linear',all('NH3',2),{angle:'180°',note:'2個のNH₃はN原子からAg⁺へ配位する。'})]}]},
 {id:'cn4',tab:'② 配位数4',title:'配位数4：正方形平面型と正四面体型',sets:[
  {id:'cu-simple',label:'Cu・高校表示',cards:[complex('cu-square','テトラアンミン銅(II)イオン','[Cu(NH₃)₄]²⁺','Cu','square',all('NH3',4),{angle:'90°',note:'高校では軸方向の配位水を省略し、正方形平面型の[Cu(NH₃)₄]²⁺として表す。'})]},
  {id:'cu-aqua',label:'Cu・配位水表示',cards:[complex('cu-aqua','テトラアンミンジアクア銅(II)イオン','[Cu(NH₃)₄(H₂O)₂]²⁺','Cu','oct',['NH3','NH3','NH3','NH3','H2O','H2O'],{angle:'90°／180°',axialLong:true,note:'省略しない表示。4個のNH₃が赤道面、2個のH₂Oが弱く長い軸方向に配位し、配位数は6。'})]},
  {id:'zn',label:'Zn・正四面体',cards:[complex('zn-tetra','テトラアンミン亜鉛(II)イオン','[Zn(NH₃)₄]²⁺','Zn','tetra',all('NH3',4),{angle:'約109.5°',note:'4個のNH₃が正四面体の頂点を占める。'})]},
  {id:'al',label:'Al・正四面体',cards:[complex('al-tetra','テトラヒドロキソアルミン酸イオン','[Al(OH)₄]⁻','Al','tetra',all('OH',4),{angle:'約109.5°',note:'Alの第一配位圏は4個のOで、正四面体型として扱う。'})]}
 ]},
 {id:'cn6',tab:'③ 配位数6',title:'配位数6：正八面体型',sets:[{id:'fe',label:'ヘキサシアニド鉄(III)',cards:[complex('fe-oct','ヘキサシアニド鉄(III)酸イオン','[Fe(CN)₆]³⁻','Fe','oct',all('CN',6),{angle:'90°／180°',note:'CN⁻はC原子側からFe³⁺へ配位する。'})]}]},
 {id:'iso4',tab:'④ 4配位異性体',title:'4配位：正方形平面型のcis/transと正四面体型',sets:[
  {id:'pt-cis-only',label:'cis体',cards:[

  ]},
  {id:'pt-trans-only',label:'trans体',cards:[
    complex('pt-trans','trans-ジアンミンジクロリド白金(II)','trans-[Pt(NH₃)₂Cl₂]','Pt','square',['Cl','Cl','NH3','NH3'],{note:'同種配位子が向かい合うためtrans型。'})
  ]},
  {id:'pt-both',label:'両方並べて表示',cards:[

    complex('pt-trans-compare','trans-ジアンミンジクロリド白金(II)','trans-[Pt(NH₃)₂Cl₂]','Pt','square',['Cl','Cl','NH3','NH3'],{sync:'pt-ct',note:'同種配位子が向かい合うためtrans型。'})
  ]},
  {id:'tetra-same',label:'正四面体型（参考）',cards:[
    complex('tetra-a','正四面体型 MA₂B₂・配置A','[MA₂B₂]','M','tetra',['A','A','B','B'],{sync:'tetra-ref',note:'正四面体では全頂点が等価。'}),
    complex('tetra-b','正四面体型 MA₂B₂・配置B','[MA₂B₂]','M','tetra',['A','B','A','B'],{sync:'tetra-ref',note:'回転により配置Aと重ね合わせられ、cis/transを区別できない。'})
  ]}
 ]},

  {id:'oct-both',label:'両方並べて表示',cards:[
   complex('oct-cis-compare','cis-[Co(NH₃)₄Cl₂]⁺','cis-[Co(NH₃)₄Cl₂]⁺','Co','oct',['Cl','NH3','Cl','NH3','NH3','NH3'],{sync:'oct-ct',note:'Cl–Co–Clは90°。'}),
   complex('oct-trans-compare','trans-[Co(NH₃)₄Cl₂]⁺','trans-[Co(NH₃)₄Cl₂]⁺','Co','oct',['Cl','Cl','NH3','NH3','NH3','NH3'],{sync:'oct-ct',note:'Cl–Co–Clは180°。'})
  ]}
 ]},
 {id:'facmer',tab:'⑥ 6配位fac/mer',title:'正八面体型 MA₃B₃：fac/mer',sets:[
  {id:'fac-only',label:'fac体',cards:[complex('oct-fac','fac-[Co(NH₃)₃Cl₃]','fac-[Co(NH₃)₃Cl₃]','Co','oct',['Cl','NH3','Cl','NH3','Cl','NH3'],{specialGuide:'fac',guideIndices:[0,2,4],note:'3個のClが八面体の同じ三角形面を占める。'})]},
  {id:'mer-only',label:'mer体',cards:[complex('oct-mer','mer-[Co(NH₃)₃Cl₃]','mer-[Co(NH₃)₃Cl₃]','Co','oct',['Cl','Cl','Cl','NH3','NH3','NH3'],{specialGuide:'mer',guideIndices:[0,1,2],note:'3個のClとCoが子午面に並び、2個のClがtransになる。'})]},
  {id:'facmer-both',label:'両方並べて表示',cards:[

   complex('oct-mer-compare','mer-[Co(NH₃)₃Cl₃]','mer-[Co(NH₃)₃Cl₃]','Co','oct',['Cl','Cl','Cl','NH3','NH3','NH3'],{sync:'facmer',specialGuide:'mer',guideIndices:[0,1,2],note:'3個のClとCoが子午面に並び、2個のClがtransになる。'})
  ]}
 ]},
 {id:'bidentate',tab:'⑦ 二座配位子',title:'エタン-1,2-ジアミン：二座配位とΔ/Λ',sets:[

  atoms.forEach(a=>{const radius=(a.center?37:a.outer?29:a.small?18:33)*canvasScale*a.q.scale*zoomScale,gr=ctx.createRadialGradient(a.q.x-radius*.34,a.q.y-radius*.38,radius*.12,a.q.x,a.q.y,radius);gr.addColorStop(0,a.palette.highlight);gr.addColorStop(.24,a.palette.base);gr.addColorStop(1,a.palette.outline);ctx.beginPath();ctx.arc(a.q.x,a.q.y,radius,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();ctx.strokeStyle=a.palette.outline;ctx.lineWidth=Math.max(1.5,zoomScale*1.4);ctx.stroke();const fontSize=Math.max(a.small?8:11,Math.min(25,(a.label.length>2?(a.small?9:13):16)*canvasScale*zoomScale));ctx.font=`900 ${fontSize}px Inter,Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.lineJoin='round';ctx.strokeStyle='rgba(255,255,255,.96)';ctx.lineWidth=Math.max(3,fontSize*.22);ctx.strokeText(a.label,a.q.x,a.q.y+.5);ctx.fillStyle='#111827';ctx.fillText(a.label,a.q.x,a.q.y+.5)});
 }
}
function visibleCanvases(){document.querySelectorAll('.panel.active .model-set:not([hidden]) .mol-canvas').forEach(c=>{if(!views.has(c.dataset.model))views.set(c.dataset.model,new ModelView(c,modelMap.get(c.dataset.model)));else views.get(c.dataset.model).resize()})}
function scheduleLayout(){requestAnimationFrame(()=>requestAnimationFrame(()=>{visibleCanvases();views.forEach(v=>{if(v.c.offsetParent!==null)v.resize()})}))}
const resizeObserver=new ResizeObserver(scheduleLayout);resizeObserver.observe(root);
let preferredView=root.dataset.view||'both';
function applyView(view){root.dataset.view=view;document.querySelectorAll('[data-view-choice]').forEach(x=>x.setAttribute('aria-pressed',x.dataset.viewChoice===view));scheduleLayout()}
function activateTab(index){const tabButtons=[...tabs.querySelectorAll('[role="tab"]')];tabButtons.forEach((b,i)=>{const on=i===index;b.setAttribute('aria-selected',on);b.tabIndex=on?0:-1;const panel=document.getElementById(b.getAttribute('aria-controls'));panel.hidden=!on;panel.classList.toggle('active',on)});root.dataset.tab=lessons[index].id;applyView(lessons[index].id==='bidentate'?'3d':preferredView);document.getElementById('coord-live').textContent=`${tabButtons[index].textContent}を表示しました`}
[...tabs.querySelectorAll('[role="tab"]')].forEach((b,i,arr)=>{b.addEventListener('click',()=>activateTab(i));b.addEventListener('keydown',e=>{let n;if(e.key==='ArrowRight')n=(i+1)%arr.length;else if(e.key==='ArrowLeft')n=(i-1+arr.length)%arr.length;else if(e.key==='Home')n=0;else if(e.key==='End')n=arr.length-1;if(n!==undefined){e.preventDefault();arr[n].focus();activateTab(n)}})});
document.querySelectorAll('.compare-tools [data-set]').forEach(b=>b.addEventListener('click',()=>{const panel=b.closest('.panel');panel.querySelectorAll('.compare-tools [data-set]').forEach(x=>x.setAttribute('aria-pressed',x===b));panel.querySelectorAll('.model-set').forEach(x=>x.hidden=x.dataset.setPanel!==b.dataset.set);document.getElementById('coord-live').textContent=`${b.textContent}を表示しました`;scheduleLayout()}));
document.querySelectorAll('[data-view-choice]').forEach(b=>b.addEventListener('click',()=>{preferredView=b.dataset.viewChoice;applyView(preferredView)}));
document.getElementById('coord-guide').addEventListener('click',e=>{guidesVisible=!guidesVisible;e.currentTarget.setAttribute('aria-pressed',guidesVisible);e.currentTarget.textContent=`補助図形 ${guidesVisible?'ON':'OFF'}`;views.forEach(v=>v.draw())});
document.querySelectorAll('[data-reset]').forEach(b=>b.addEventListener('click',()=>views.get(b.dataset.reset)?.reset()));
const fs=document.getElementById('coord-fullscreen');fs.addEventListener('click',async()=>{try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen();else await document.exitFullscreen()}catch(e){document.getElementById('coord-live').textContent='このブラウザでは全画面表示を開始できませんでした'}});document.addEventListener('fullscreenchange',()=>{const active=!!document.fullscreenElement;document.body.classList.toggle('is-fullscreen',active);fs.querySelector('.btn-text').textContent=active?'全画面を終了':'全画面表示';fs.setAttribute('aria-label',active?'全画面を終了':'全画面表示');scheduleLayout()});
scheduleLayout();
})();
