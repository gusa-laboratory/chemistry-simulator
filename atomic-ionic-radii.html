<script>

const grid=document.getElementById('speciesGrid'),takeaway=document.getElementById('takeaway'),pairPicker=document.getElementById('pairPicker'),periodPicker=document.getElementById('periodPicker'),periodOptions=document.getElementById('periodOptions'),periodCount=document.getElementById('periodCount'),periodMessage=document.getElementById('periodMessage'),clearPeriodButton=document.getElementById('clearPeriodButton'),freePicker=document.getElementById('freePicker'),selectedCount=document.getElementById('selectedCount'),freeMessage=document.getElementById('freeMessage'),sortButton=document.getElementById('sortButton'),clearSelectionButton=document.getElementById('clearSelectionButton'),attractionLegend=document.getElementById('attractionLegend');
function currentKeys(){let keys=state.mode==='period2'?modes.period2.available.filter(key=>state.period2Selected.includes(key)):state.mode==='period3'?modes.period3.available.filter(key=>state.period3Selected.includes(key)):state.mode==='atomIon'?pairs[state.pair]:state.mode==='free'?state.selected:modes[state.mode].keys;return state.mode==='free'&&state.sortRadius?[...keys].sort((a,b)=>species[b].radius-species[a].radius):keys}
function electronDots(cx,cy,r,count,shellIndex){let dots='';const offset=shellIndex%2?-.18:0;for(let i=0;i<count;i++){const a=-Math.PI/2+offset+i*Math.PI*2/count,x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;dots+=`<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="3.15" fill="#38bdf8" stroke="#153047" stroke-width="1.25"/>`}return dots}
function effectiveAttraction(item){const n=item.shells.length,same=Math.max(0,item.shells[n-1]-1);let shielding=same*(n===1?.30:.35);if(n>1)shielding+=item.shells[n-2]*.85;if(n>2)shielding+=item.shells.slice(0,n-2).reduce((sum,count)=>sum+count,0);return Math.max(.2,item.z-shielding)}
function attractionArrows(cx,cy,outer,norm){if(!state.attraction)return'';const width=2.2+norm*3.8,opacity=.58+norm*.36,startR=Math.max(50,outer-4),endR=27;return[-Math.PI/2,Math.PI/6,Math.PI*5/6].map(angle=>{const ux=-Math.cos(angle),uy=-Math.sin(angle),px=-uy,py=ux,x1=cx+Math.cos(angle)*startR,y1=cy+Math.sin(angle)*startR,x2=cx+Math.cos(angle)*endR,y2=cy+Math.sin(angle)*endR,bx=x2-ux*8,by=y2-uy*8;return `<g opacity="${opacity.toFixed(2)}"><line x1="${x1.toFixed(2)}" y1="${y1.toFixed(2)}" x2="${bx.toFixed(2)}" y2="${by.toFixed(2)}" stroke="#ea580c" stroke-width="${width.toFixed(2)}" stroke-linecap="round"/><polygon points="${x2.toFixed(2)},${y2.toFixed(2)} ${(bx+px*4.5).toFixed(2)},${(by+py*4.5).toFixed(2)} ${(bx-px*4.5).toFixed(2)},${(by-py*4.5).toFixed(2)}" fill="#ea580c"/></g>`}).join('')}
function radiusNotation(pm){const meters=pm*1e-12,exponent=Math.floor(Math.log10(meters)),coefficient=meters/10**exponent,expText=exponent<0?`−${Math.abs(exponent)}`:`${exponent}`;return{html:`${coefficient.toPrecision(3)} × 10<sup>${expText}</sup> m`,aria:`${coefficient.toPrecision(3)}かける10の${exponent<0?'マイナス':''}${Math.abs(exponent)}乗メートル`}}
function atomSVG(item,maxRadius,minStrength,maxStrength){const cx=130,cy=145,nucleusR=20,outer=Math.max(43,item.radius/maxRadius*112),span=Math.max(10,outer-nucleusR-11),strength=effectiveAttraction(item),norm=maxStrength===minStrength?.5:(strength-minStrength)/(maxStrength-minStrength);let rings='',dots='';item.shells.forEach((count,i)=>{const r=nucleusR+11+span*(i+1)/item.shells.length;rings+=`<circle cx="${cx}" cy="${cy}" r="${r.toFixed(2)}" fill="none" stroke="#1f2937" stroke-width="1.5"/>`;if(state.electrons)dots+=electronDots(cx,cy,r,count,i)});const nuclearText=state.nucleus?`<text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="18" font-weight="850">${item.z}+</text>`:'',notation=radiusNotation(item.radius);return `<svg class="atom-svg" viewBox="0 0 260 290" role="img" aria-label="${item.symbol}、半径${notation.aria}、電子配置${item.shells.join('、')}"><circle cx="${cx}" cy="${cy}" r="${outer.toFixed(2)}" fill="rgba(56,189,248,.035)"/>${rings}${attractionArrows(cx,cy,outer,norm)}<circle cx="${cx}" cy="${cy}" r="${nucleusR}" fill="#d91636" stroke="#7f1023" stroke-width="2"/>${nuclearText}${dots}</svg>`}
function activePeriodSelection(){return state.mode==='period2'?state.period2Selected:state.period3Selected}
function renderPeriodPicker(){const active=state.mode==='period2'||state.mode==='period3';periodPicker.classList.toggle('is-visible',active);if(!active)return;const selected=activePeriodSelection(),available=modes[state.mode].available;periodCount.textContent=`${selected.length} / 8`;clearPeriodButton.disabled=selected.length===0;periodOptions.replaceChildren();available.forEach(key=>{const button=document.createElement('button');button.type='button';button.className='period-option';button.dataset.periodSpecies=key;button.setAttribute('aria-pressed',selected.includes(key));button.textContent=species[key].symbol;periodOptions.appendChild(button)})}
function moveFreeItem(key,delta){const ordered=currentKeys();state.selected=[...ordered];state.sortRadius=false;const index=state.selected.indexOf(key),next=index+delta;if(next<0||next>=state.selected.length)return;[state.selected[index],state.selected[next]]=[state.selected[next],state.selected[index]];render()}
function render(){const mode=modes[state.mode],keys=currentKeys(),items=keys.map(key=>species[key]);takeaway.textContent=mode.takeaway;pairPicker.classList.toggle('is-visible',state.mode==='atomIon');freePicker.classList.toggle('is-visible',state.mode==='free');renderPeriodPicker();selectedCount.textContent=`${state.selected.length} / 4`;clearSelectionButton.disabled=state.selected.length===0;freePicker.querySelectorAll('[data-species]').forEach(button=>button.setAttribute('aria-pressed',state.selected.includes(button.dataset.species)));sortButton.setAttribute('aria-pressed',state.sortRadius);sortButton.textContent=state.sortRadius?'半径順':'選択順';grid.classList.toggle('free-grid',state.mode==='free');grid.replaceChildren();if(items.length===0){attractionLegend.hidden=true;grid.style.setProperty('--count',1);grid.innerHTML='<div class="empty-state">上のボタンから表示する粒子を選んでください</div>';return}attractionLegend.hidden=!state.attraction;const maxRadius=Math.max(...items.map(item=>item.radius)),strengths=items.map(effectiveAttraction),minStrength=Math.min(...strengths),maxStrength=Math.max(...strengths);grid.style.setProperty('--count',items.length);keys.forEach((key,index)=>{const item=species[key],card=document.createElement('article'),notation=radiusNotation(item.radius),orderControls=state.mode==='free'?`<div class="order-controls"><button type="button" data-move="-1" data-key="${key}" aria-label="${item.symbol}を左へ移動" ${index===0?'disabled':''}>←</button><button type="button" data-move="1" data-key="${key}" aria-label="${item.symbol}を右へ移動" ${index===keys.length-1?'disabled':''}>→</button></div>`:'';card.className='species';card.innerHTML=`<div class="species-head"><div class="species-name"><span class="species-symbol">${item.symbol}</span><span class="species-jp">${item.name}</span></div>${orderControls}</div>${atomSVG(item,maxRadius,minStrength,maxStrength)}<div class="radius-value" aria-label="${notation.aria}" ${state.values?'':'hidden'}>${notation.html}</div><div class="config">電子配置：${item.shells.join(', ')}</div>`;grid.appendChild(card)})}
document.getElementById('tabs').querySelectorAll('[data-mode]').forEach(button=>button.addEventListener('click',()=>{state.mode=button.dataset.mode;periodMessage.textContent='';freeMessage.textContent='';document.querySelectorAll('[data-mode]').forEach(tab=>tab.setAttribute('aria-selected',tab===button));render()}));
periodOptions.addEventListener('click',event=>{const button=event.target.closest('[data-period-species]');if(!button)return;const selected=activePeriodSelection(),key=button.dataset.periodSpecies,index=selected.indexOf(key);periodMessage.textContent='';if(index>=0)selected.splice(index,1);else if(selected.length>=8){periodMessage.textContent='表示できるのは最大8個です';return}else selected.push(key);render()});
clearPeriodButton.addEventListener('click',()=>{activePeriodSelection().length=0;periodMessage.textContent='';render()});
pairPicker.querySelectorAll('[data-pair]').forEach(button=>button.addEventListener('click',()=>{state.pair=button.dataset.pair;pairPicker.querySelectorAll('[data-pair]').forEach(item=>item.setAttribute('aria-pressed',item===button));render()}));
freePicker.querySelectorAll('[data-species]').forEach(button=>button.addEventListener('click',()=>{const key=button.dataset.species,index=state.selected.indexOf(key);freeMessage.textContent='';if(index>=0)state.selected.splice(index,1);else{if(state.selected.length>=4){freeMessage.textContent='選べるのは最大4個です';return}state.selected.push(key)}render()}));
grid.addEventListener('click',event=>{const button=event.target.closest('[data-move]');if(button)moveFreeItem(button.dataset.key,Number(button.dataset.move))});
sortButton.addEventListener('click',()=>{state.sortRadius=!state.sortRadius;freeMessage.textContent='';render()});
clearSelectionButton.addEventListener('click',()=>{state.selected.length=0;freeMessage.textContent='';render()});
function bindToggle(id,key,label){document.getElementById(id).addEventListener('click',event=>{state[key]=!state[key];event.currentTarget.setAttribute('aria-pressed',state[key]);event.currentTarget.textContent=`${label} ${state[key]?'ON':'OFF'}`;render()})}
bindToggle('electronToggle','electrons','電子表示');bindToggle('nucleusToggle','nucleus','核電荷表示');bindToggle('attractionToggle','attraction','引力矢印');bindToggle('valueToggle','values','半径数値');
const fs=document.getElementById('fullscreenBtn');fs.addEventListener('click',async()=>{try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen();else await document.exitFullscreen()}catch(error){}});document.addEventListener('fullscreenchange',()=>{const active=!!document.fullscreenElement;document.body.classList.toggle('is-fullscreen',active);fs.querySelector('.btn-text').textContent=active?'全画面を終了':'全画面表示';fs.setAttribute('aria-label',active?'全画面を終了':'全画面表示')});
render();
</script>
